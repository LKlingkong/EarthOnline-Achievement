<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地球Online - 成就系统</title>
<meta name="description" content="地球Online人生成就系统 - 把人生当作一款MMORPG，记录你的每一个成就">
<meta name="theme-color" content="#08080d">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #08080d;
  color: #e8e6e3;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  text-align: center;
  padding: 48px 20px 20px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -40%;
  left: 50%;
  transform: translateX(-50%);
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(191,154,38,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.header h1 {
  font-size: 34px;
  font-weight: 700;
  color: #bf9a26;
  letter-spacing: 6px;
  text-shadow: 0 0 60px rgba(191,154,38,0.2);
  position: relative;
}
.header .subtitle {
  margin-top: 8px;
  font-size: 13px;
  color: #555;
  letter-spacing: 3px;
}

/* ── Stats ── */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  padding: 16px 20px 28px;
}
.stat-item {
  background: rgba(191,154,38,0.04);
  border: 1px solid rgba(191,154,38,0.1);
  border-radius: 12px;
  padding: 14px 26px;
  text-align: center;
  min-width: 130px;
  transition: all 0.3s;
}
.stat-item:hover {
  transform: translateY(-2px);
  border-color: rgba(191,154,38,0.25);
}
.stat-number {
  font-size: 26px;
  font-weight: 700;
  color: #bf9a26;
}
.stat-label {
  font-size: 11px;
  color: #666;
  margin-top: 4px;
  letter-spacing: 1px;
}

/* ── Toolbar ── */
.toolbar {
  max-width: 960px;
  margin: 0 auto 16px;
  padding: 0 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.search-box {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 11px 14px 11px 40px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: #e8e6e3;
  font-size: 13px;
  outline: none;
  transition: all 0.3s;
}
.search-box input:focus {
  border-color: rgba(191,154,38,0.4);
  background: rgba(191,154,38,0.04);
}
.search-box input::placeholder { color: #444; }
.search-box .search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: #444;
  font-size: 15px;
  pointer-events: none;
}
.toolbar-btns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.sort-btn, .action-btn {
  padding: 9px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  color: #888;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.25s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sort-btn:hover, .action-btn:hover { border-color: rgba(255,255,255,0.18); color: #bbb; }
.sort-btn.active {
  background: rgba(191,154,38,0.08);
  border-color: rgba(191,154,38,0.3);
  color: #bf9a26;
}
.sort-btn .arrow { transition: transform 0.3s; }
.sort-btn.desc .arrow { transform: rotate(180deg); }
.action-btn.danger { color: #e55; border-color: rgba(229,85,85,0.2); }
.action-btn.danger:hover { background: rgba(229,85,85,0.08); color: #f77; }
.action-btn.export-btn:hover { border-color: rgba(191,154,38,0.3); color: #bf9a26; }

/* ── Difficulty sections ── */
.difficulty-label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
}
.difficulty-label .line { flex: 1; height: 1px; }
.difficulty-label.legendary { color: #d4a82a; }
.difficulty-label.legendary .line { background: linear-gradient(90deg, rgba(191,154,38,0.3), transparent); }
.difficulty-label.epic { color: #c084fc; }
.difficulty-label.epic .line { background: linear-gradient(90deg, rgba(168,85,247,0.3), transparent); }
.difficulty-label.rare { color: #60a5fa; }
.difficulty-label.rare .line { background: linear-gradient(90deg, rgba(59,130,246,0.3), transparent); }
.difficulty-label.common { color: #888; }
.difficulty-label.common .line { background: linear-gradient(90deg, rgba(150,150,150,0.2), transparent); }

/* ── Category tabs ── */
.category-tabs {
  max-width: 960px;
  margin: 0 auto 20px;
  padding: 0 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.cat-tab {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  color: #666;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.25s;
}
.cat-tab:hover { color: #999; border-color: rgba(255,255,255,0.15); }
.cat-tab.active {
  background: rgba(191,154,38,0.08);
  border-color: rgba(191,154,38,0.25);
  color: #bf9a26;
}

/* ── Grid ── */
.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.achievement-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 14px;
}

/* ── Card: LOCKED (grey/dark) ── */
.achievement-card {
  background: #111116;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.5s ease forwards;
  opacity: 0;
  transform: translateY(10px);
}
@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}
.achievement-card.locked {
  background: #0c0c10;
  border-color: rgba(255,255,255,0.04);
}
.achievement-card.locked .icon-box {
  background: rgba(255,255,255,0.03);
  border-color: rgba(255,255,255,0.06);
}
.achievement-card.locked .icon-svg {
  stroke: #333;
  opacity: 0.4;
}
.achievement-card.locked .card-title { color: #444; }
.achievement-card.locked .card-desc { color: #333; }
.achievement-card.locked .rate-text { color: #333; }
.achievement-card.locked .rate-text span { color: #444; }
.achievement-card.locked .rate-bar-bg { background: rgba(255,255,255,0.02); }
.achievement-card.locked .rate-bar-fill {
  background: linear-gradient(90deg, #222, #333);
}
.achievement-card.locked .card-footer {
  border-top-color: rgba(255,255,255,0.03);
}
.achievement-card.locked .rarity-indicator { opacity: 0.35; }
.achievement-card.locked:hover {
  border-color: rgba(255,255,255,0.1);
  background: #121218;
  transform: translateY(-2px);
}
.achievement-card.locked:hover .icon-svg {
  stroke: #555;
  opacity: 0.7;
}
.achievement-card.locked:hover .card-title { color: #666; }

/* ── Card: UNLOCKED (golden highlight) ── */
.achievement-card.unlocked {
  background: linear-gradient(145deg, #1a170a 0%, #13110a 100%);
  border-color: rgba(191,154,38,0.2);
  box-shadow: 0 0 0 rgba(191,154,38,0), inset 0 0 30px rgba(191,154,38,0.02);
}
.achievement-card.unlocked::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(191,154,38,0.5), transparent);
}
.achievement-card.unlocked .icon-box {
  background: linear-gradient(135deg, rgba(191,154,38,0.15) 0%, rgba(191,154,38,0.04) 100%);
  border-color: rgba(191,154,38,0.25);
}
.achievement-card.unlocked .icon-svg {
  stroke: #d4a82a;
  filter: drop-shadow(0 0 4px rgba(191,154,38,0.3));
}
.achievement-card.unlocked .card-title { color: #f5e6a3; }
.achievement-card.unlocked .card-desc { color: #999; }
.achievement-card.unlocked .rate-bar-fill {
  background: linear-gradient(90deg, #8B6914, #d4a82a);
}
.achievement-card.unlocked:hover {
  border-color: rgba(191,154,38,0.4);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3), 0 0 30px rgba(191,154,38,0.06);
  transform: translateY(-3px);
}

/* ── Card layout ── */
.card-top {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.icon-box {
  width: 54px;
  height: 54px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
  transition: all 0.35s;
}
.icon-box .icon-svg {
  width: 30px;
  height: 30px;
  fill: none;
  stroke-width: 1.6;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: all 0.35s;
}
.icon-box .sparkles {
  position: absolute;
  top: -4px;
  right: -4px;
  font-size: 10px;
  color: #d4a82a;
  filter: drop-shadow(0 0 4px rgba(191,154,38,0.6));
  animation: twinkle 2s ease infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.card-info { flex: 1; min-width: 0; }
.card-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 5px;
  transition: color 0.35s;
}
.card-desc {
  font-size: 12.5px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  transition: color 0.35s;
}
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding-top: 11px;
  border-top: 1px solid rgba(255,255,255,0.06);
  transition: border-color 0.35s;
}
.rate-bar-container { flex: 1; margin-right: 14px; }
.rate-bar-bg {
  height: 4px;
  background: rgba(255,255,255,0.04);
  border-radius: 3px;
  overflow: hidden;
}
.rate-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease;
  width: 0%;
}
.rate-text {
  font-size: 10.5px;
  margin-top: 4px;
  transition: color 0.35s;
}

/* ── Rarity badge ── */
.rarity-indicator {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 10.5px;
  font-weight: 500;
  flex-shrink: 0;
  transition: all 0.35s;
}
.rarity-common { background: rgba(120,120,120,0.08); color: #666; border: 1px solid rgba(120,120,120,0.12); }
.rarity-rare { background: rgba(59,130,246,0.08); color: #5090e0; border: 1px solid rgba(59,130,246,0.15); }
.rarity-epic { background: rgba(168,85,247,0.08); color: #a86fe0; border: 1px solid rgba(168,85,247,0.15); }
.rarity-legendary { background: rgba(191,154,38,0.08); color: #bf9a26; border: 1px solid rgba(191,154,38,0.2); }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: #444;
}
.empty-state .empty-icon { font-size: 42px; margin-bottom: 14px; opacity: 0.25; }

/* ── Footer ── */
.footer-note {
  text-align: center;
  padding: 24px 20px 40px;
  color: #333;
  font-size: 11px;
  letter-spacing: 1px;
}

/* ── Modal ── */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-backdrop.show { display: flex; }
.modal {
  background: #14141c;
  border: 1px solid rgba(191,154,38,0.15);
  border-radius: 18px;
  max-width: 480px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 30px 26px;
  position: relative;
  animation: modalIn 0.3s ease;
}
@keyframes modalIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  background: none;
  border: 1px solid rgba(255,255,255,0.08);
  color: #555;
  width: 30px; height: 30px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover { color: #aaa; border-color: rgba(255,255,255,0.2); }

.modal-icon-wrap { text-align: center; margin-bottom: 18px; }
.modal-icon {
  width: 72px; height: 72px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(191,154,38,0.12), rgba(191,154,38,0.02));
  border: 1px solid rgba(191,154,38,0.18);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.modal-icon .icon-svg {
  width: 40px; height: 40px;
  fill: none; stroke: #bf9a26;
  stroke-width: 1.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.modal-icon.locked-icon {
  background: rgba(255,255,255,0.02);
  border-color: rgba(255,255,255,0.06);
}
.modal-icon.locked-icon .icon-svg { stroke: #333; opacity: 0.5; }
.modal-cat-tag {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 10px;
  font-size: 11px;
  background: rgba(191,154,38,0.06);
  color: #888;
  border: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 14px;
}
.modal-title {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  color: #e8d8a0;
  margin-bottom: 8px;
}
.modal-title.locked-title { color: #555; }
.modal-desc {
  text-align: center;
  font-size: 13px;
  color: #888;
  margin-bottom: 18px;
  line-height: 1.6;
}
.modal-desc.locked-desc { color: #444; }
.modal-stats {
  display: flex;
  justify-content: center;
  gap: 28px;
  margin-bottom: 20px;
}
.modal-stat { text-align: center; }
.modal-stat-num { font-size: 22px; font-weight: 700; color: #bf9a26; }
.modal-stat-num.locked-stat { color: #444; }
.modal-stat-label { font-size: 10.5px; color: #555; margin-top: 2px; }
.modal-story {
  background: rgba(255,255,255,0.02);
  border-radius: 10px;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.04);
  margin-bottom: 18px;
}
.modal-story-label { color: #555; font-size: 11px; margin-bottom: 7px; }
.modal-story-text { color: #999; font-size: 13px; line-height: 1.75; }
.modal-toggle-btn {
  display: block;
  margin: 0 auto;
  padding: 9px 28px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.25s;
  border: 1px solid rgba(191,154,38,0.2);
  background: rgba(191,154,38,0.06);
  color: #bf9a26;
}
.modal-toggle-btn:hover {
  background: rgba(191,154,38,0.12);
  border-color: rgba(191,154,38,0.35);
}
.modal-toggle-btn.locked-btn {
  border-color: rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: #666;
}
.modal-toggle-btn.locked-btn:hover {
  border-color: rgba(191,154,38,0.25);
  color: #bf9a26;
}

/* ── Toast notification ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #1a1a24;
  border: 1px solid rgba(191,154,38,0.2);
  color: #e8e6e3;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 13px;
  z-index: 200;
  opacity: 0;
  transition: all 0.4s ease;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Responsive ── */
@media (max-width: 520px) {
  .achievement-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 24px; letter-spacing: 3px; }
  .stat-item { padding: 10px 16px; min-width: 100px; }
  .stat-number { font-size: 20px; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .toolbar-btns { justify-content: center; }
  .modal { padding: 22px 18px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>地球 Online</h1>
  <div class="subtitle">Achievement System · 人生成就系统</div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="搜索成就名称或描述...">
  </div>
  <div class="toolbar-btns">
    <button class="sort-btn active" id="sortBtn" onclick="toggleSort()">
      解锁难度 <span class="arrow">&#9650;</span>
    </button>
    <button class="action-btn export-btn" onclick="exportProgress()" title="导出存档到文件">
      &#128229; 导出
    </button>
    <button class="action-btn export-btn" onclick="document.getElementById('importFile').click()" title="从文件导入存档">
      &#128228; 导入
    </button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProgress(this)">
    <button class="action-btn danger" onclick="resetProgress()" title="清除本地存档，恢复初始状态">
      &#8634; 重置
    </button>
  </div>
</div>

<div class="category-tabs" id="categoryTabs"></div>

<div class="container" id="mainContainer">
  <div class="achievement-grid" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">&#128270;</div>
    <p>没有找到匹配的成就</p>
  </div>
</div>

<div class="footer-note">
  地球Online v2026.06 · 每个人都是自己人生的主角
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Achievement Data ──
const achievements = [
  { id:1, title:"主角登场", desc:"成功创建专属角色，正式登陆地球Online服务器。", rate:100, category:"新手", rarity:"common",
    icon:"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z",
    detail:"每个玩家进入游戏世界的第一个成就，标志着你作为独立个体的诞生。从这一刻起，你的每一步选择都将被记录。"},

  { id:2, title:"难道我是天才？", desc:"考试获得过高分", rate:72, category:"学业", rarity:"common",
    icon:"M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z",
    detail:"在某个关键时刻，你展现出了超越常人的学习能力。也许只是一次考试，但那一刻的自信，至今难忘。" },

// ── State ──
let unlockedSet = new Set(
  JSON.parse(localStorage.getItem('earthOL_unlocked') || '[]')
);
let currentCategory = 'all';
let searchQuery = '';
let sortAsc = true;

const categories = [...new Set(achievements.map(a => a.category))];

function saveUnlockedState() {
  localStorage.setItem('earthOL_unlocked', JSON.stringify([...unlockedSet]));
}

function getRarityInfo(r) {
  return { common:'普通', rare:'稀有', epic:'史诗', legendary:'传说' }[r] || '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Stats ──
function initStats() {
  const total = achievements.length;
  const unlocked = unlockedSet.size;
  const legendaryCount = achievements.filter(a => a.rarity === 'legendary').length;
  const legendUnlocked = achievements.filter(a => a.rarity === 'legendary' && unlockedSet.has(a.id)).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item"><div class="stat-number">${total}</div><div class="stat-label">成就总数</div></div>
    <div class="stat-item"><div class="stat-number">${unlocked}</div><div class="stat-label">已解锁</div></div>
    <div class="stat-item"><div class="stat-number">${legendUnlocked}/${legendaryCount}</div><div class="stat-label">传说成就</div></div>
  `;
}

// ── Category tabs ──
function initCategoryTabs() {
  const c = document.getElementById('categoryTabs');
  let h = `<button class="cat-tab ${currentCategory==='all'?'active':''}" data-cat="all">全部</button>`;
  categories.forEach(cat => {
    h += `<button class="cat-tab ${currentCategory===cat?'active':''}" data-cat="${cat}">${cat}</button>`;
  });
  c.innerHTML = h;
  c.querySelectorAll('.cat-tab').forEach(btn => {
    btn.onclick = () => {
      currentCategory = btn.dataset.cat;
      c.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    };
  });
}

// ── Sort toggle ──
function toggleSort() {
  sortAsc = !sortAsc;
  const btn = document.getElementById('sortBtn');
  btn.classList.toggle('desc', !sortAsc);
  btn.classList.toggle('active', true);
  renderGrid();
}

// ── Render ──
function renderGrid() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');

  let filtered = achievements.filter(a => {
    if (currentCategory !== 'all' && a.category !== currentCategory) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!a.title.toLowerCase().includes(q) && !a.desc.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => sortAsc ? a.rate - b.rate : b.rate - a.rate);

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const tierOrder = ['legendary','epic','rare','common'];
  const grouped = {};
  filtered.forEach(a => {
    if (!grouped[a.rarity]) grouped[a.rarity] = [];
    grouped[a.rarity].push(a);
  });

  let html = '';
  tierOrder.forEach(tier => {
    if (!grouped[tier] || grouped[tier].length === 0) return;
    const labelMap = {
      legendary: '★ 传说难度 — 全服仅少数玩家达成',
      epic: '☆ 史诗难度 — 极难达成',
      rare: '· 稀有难度 — 少数玩家拥有',
      common: '· 普通难度 — 多数玩家可达成'
    };
    html += `<div style="grid-column:1/-1;"><div class="difficulty-label ${tier}">${labelMap[tier]}<span class="line"></span></div></div>`;
    grouped[tier].forEach((a, i) => {
      const isUnlocked = unlockedSet.has(a.id);
      html += `
      <div class="achievement-card ${isUnlocked?'unlocked':'locked'}"
           style="animation-delay:${i*0.05}s"
           data-id="${a.id}"
           onclick="openModal(${a.id})">
        <div class="card-top">
          <div class="icon-box">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="${a.icon}"/></svg>
            ${isUnlocked ? '<span class="sparkles">✦</span>' : ''}
          </div>
          <div class="card-info">
            <div class="card-title">${a.title}</div>
            <div class="card-desc">${a.desc}</div>
          </div>
        </div>
        <div class="card-footer">
          <div class="rate-bar-container">
            <div class="rate-bar-bg"><div class="rate-bar-fill" style="width:${a.rate}%"></div></div>
            <div class="rate-text"><span>${a.rate}%</span> 玩家拥有</div>
          </div>
          <span class="rarity-indicator rarity-${a.rarity}">${getRarityInfo(a.rarity)}</span>
        </div>
      </div>`;
    });
  });

  grid.innerHTML = html;

  requestAnimationFrame(() => {
    document.querySelectorAll('.rate-bar-fill').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0%';
      requestAnimationFrame(() => { bar.style.width = w; });
    });
  });
}

// ── Modal ──
function openModal(id) {
  const a = achievements.find(x => x.id === id);
  if (!a) return;
  const isUnlocked = unlockedSet.has(a.id);

  document.getElementById('modalContent').innerHTML = `
    <div style="text-align:center;">
      <div class="modal-cat-tag">${a.category} · ${getRarityInfo(a.rarity)}</div>
    </div>
    <div class="modal-icon-wrap">
      <div class="modal-icon ${isUnlocked?'':'locked-icon'}">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="${a.icon}"/></svg>
      </div>
    </div>
    <div class="modal-title ${isUnlocked?'':'locked-title'}">${a.title}</div>
    <div class="modal-desc ${isUnlocked?'':'locked-desc'}">${a.desc}</div>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-num ${isUnlocked?'':'locked-stat'}">${a.rate}%</div>
        <div class="modal-stat-label">全球达成率</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-num ${isUnlocked?'':'locked-stat'}">#${a.id}</div>
        <div class="modal-stat-label">成就编号</div>
      </div>
    </div>
    <div class="modal-story">
      <div class="modal-story-label">成就故事</div>
      <div class="modal-story-text">${a.detail || '这是一个关于成长的成就，等待你去书写属于你的故事。'}</div>
    </div>
    <button class="modal-toggle-btn ${isUnlocked?'':'locked-btn'}" onclick="toggleUnlock(${a.id});closeModal();renderGrid();initStats();">
      ${isUnlocked ? '🔒 标记为未解锁' : '✨ 解锁此成就'}
    </button>
  `;
  document.getElementById('modalBackdrop').classList.add('show');
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('show');
}

function toggleUnlock(id) {
  if (unlockedSet.has(id)) unlockedSet.delete(id);
  else unlockedSet.add(id);
  saveUnlockedState();
}

// ── Export / Import / Reset ──
function exportProgress() {
  const data = {
    version: '1.0',
    exportDate: new Date().toISOString(),
    unlocked: [...unlockedSet]
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `地球Online成就存档_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 存档已导出！可发送给朋友导入他们的页面');
}

function importProgress(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.unlocked || !Array.isArray(data.unlocked)) throw new Error('无效格式');
      unlockedSet = new Set(data.unlocked);
      saveUnlockedState();
      renderGrid();
      initStats();
      showToast(`✅ 已导入 ${unlockedSet.size} 个成就进度！`);
    } catch (err) {
      showToast('❌ 导入失败：文件格式不正确');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function resetProgress() {
  if (!confirm('确定要清除所有本地存档，恢复初始未解锁状态吗？\n\n此操作只会清除当前设备的存档，不影响他人。')) return;
  unlockedSet.clear();
  saveUnlockedState();
  renderGrid();
  initStats();
  showToast('🔄 进度已重置！页面已恢复初始状态。');
}

// ── Search ──
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderGrid();
});

// ESC to close modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Init ──
initStats();
initCategoryTabs();
renderGrid();
</script>
</body>
</html>
