<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地球Online - 成就系统</title>
<meta name="description" content="地球Online人生成就系统 - 把人生当作一款MMORPG，记录你的每一个成就">
<meta name="theme-color" content="#08080d" id="themeColorMeta">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
/* ── Theme Variables ── */
:root {
  /* Dark theme (default) */
  --bg-primary: #08080d;
  --bg-secondary: #111116;
  --bg-card-locked: #0c0c10;
  --bg-card-unlocked: linear-gradient(145deg, #1a170a 0%, #13110a 100%);
  --bg-modal: #14141c;
  --bg-stat: rgba(191,154,38,0.04);
  --bg-input: rgba(255,255,255,0.03);
  --bg-toolbar-btn: rgba(255,255,255,0.03);
  --bg-toast: #1a1a24;
  
  --text-primary: #e8e6e3;
  --text-secondary: #999;
  --text-muted: #666;
  --text-dim: #555;
  --text-dimmer: #444;
  
  --accent: #bf9a26;
  --accent-light: #d4a82a;
  --accent-bg: rgba(191,154,38,0.08);
  --accent-border: rgba(191,154,38,0.2);
  
  --border-default: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.1);
  --border-input: rgba(255,255,255,0.08);
  
  --icon-locked-stroke: #333;
  --icon-unlocked-stroke: #d4a82a;
  
  --rate-bar-bg: rgba(255,255,255,0.04);
  --rate-bar-locked: linear-gradient(90deg, #222, #333);
  --rate-bar-unlocked: linear-gradient(90deg, #8B6914, #d4a82a);
  
  --scrollbar-bg: rgba(255,255,255,0.05);
  --scrollbar-thumb: rgba(255,255,255,0.1);
}

/* Light theme */
[data-theme="light"] {
  --bg-primary: #f5f5f0;
  --bg-secondary: #ffffff;
  --bg-card-locked: #e8e8e3;
  --bg-card-unlocked: linear-gradient(145deg, #fffbe6 0%, #fff8e1 100%);
  --bg-modal: #ffffff;
  --bg-stat: rgba(191,154,38,0.08);
  --bg-input: rgba(0,0,0,0.03);
  --bg-toolbar-btn: rgba(0,0,0,0.03);
  --bg-toast: #ffffff;
  
  --text-primary: #1a1a1a;
  --text-secondary: #666;
  --text-muted: #888;
  --text-dim: #aaa;
  --text-dimmer: #bbb;
  
  --accent: #8B6914;
  --accent-light: #d4a82a;
  --accent-bg: rgba(139,105,20,0.08);
  --accent-border: rgba(139,105,20,0.2);
  
  --border-default: rgba(0,0,0,0.08);
  --border-hover: rgba(0,0,0,0.12);
  --border-input: rgba(0,0,0,0.08);
  
  --icon-locked-stroke: #ccc;
  --icon-unlocked-stroke: #8B6914;
  
  --rate-bar-bg: rgba(0,0,0,0.05);
  --rate-bar-locked: linear-gradient(90deg, #ddd, #ccc);
  --rate-bar-unlocked: linear-gradient(90deg, #bf9a26, #d4a82a);
  
  --scrollbar-bg: rgba(0,0,0,0.05);
  --scrollbar-thumb: rgba(0,0,0,0.15);
}

/* ── Base Styles ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}

/* ── Header ── */
.header {
  text-align: center;
  padding: 48px 20px 20px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -40%;
  left: 50%;
  transform: translateX(-50%);
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(191,154,38,0.06) 0%, transparent 70%);
  pointer-events: none;
}
[data-theme="light"] .header::before {
  background: radial-gradient(circle, rgba(191,154,38,0.1) 0%, transparent 70%);
}
.header h1 {
  font-size: 34px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 6px;
  text-shadow: 0 0 60px rgba(191,154,38,0.2);
  position: relative;
}
.header .subtitle {
  margin-top: 8px;
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 3px;
}

/* ── Stats ── */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  padding: 16px 20px 28px;
}
.stat-item {
  background: var(--bg-stat);
  border: 1px solid var(--accent-border);
  border-radius: 12px;
  padding: 14px 26px;
  text-align: center;
  min-width: 130px;
  transition: all 0.3s;
}
.stat-item:hover {
  transform: translateY(-2px);
  border-color: rgba(191,154,38,0.25);
}
[data-theme="light"] .stat-item:hover {
  border-color: rgba(139,105,20,0.25);
}
.stat-number {
  font-size: 26px;
  font-weight: 700;
  color: var(--accent);
}
.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 1px;
}

/* ── Toolbar ── */
.toolbar {
  max-width: 960px;
  margin: 0 auto 16px;
  padding: 0 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.search-box {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 11px 14px 11px 40px;
  background: var(--bg-input);
  border: 1px solid var(--border-input);
  border-radius: 10px;
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
  transition: all 0.3s;
}
.search-box input:focus {
  border-color: rgba(191,154,38,0.4);
  background: rgba(191,154,38,0.04);
}
[data-theme="light"] .search-box input:focus {
  border-color: rgba(139,105,20,0.4);
  background: rgba(139,105,20,0.04);
}
.search-box input::placeholder { color: var(--text-dimmer); }
.search-box .search-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dimmer);
  font-size: 15px;
  pointer-events: none;
}
.toolbar-btns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.sort-btn, .action-btn {
  padding: 9px 16px;
  background: var(--bg-toolbar-btn);
  border: 1px solid var(--border-input);
  border-radius: 10px;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.25s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sort-btn:hover, .action-btn:hover { border-color: var(--border-hover); color: var(--text-secondary); }
.sort-btn.active {
  background: var(--accent-bg);
  border-color: var(--accent-border);
  color: var(--accent);
}
.sort-btn .arrow { transition: transform 0.3s; }
.sort-btn.desc .arrow { transform: rotate(180deg); }
.action-btn.danger { color: #e55; border-color: rgba(229,85,85,0.2); }
.action-btn.danger:hover { background: rgba(229,85,85,0.08); color: #f77; }
.action-btn.export-btn:hover { border-color: var(--accent-border); color: var(--accent); }

/* ── Theme Toggle Button ── */
.theme-toggle {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--bg-toolbar-btn);
  border: 1px solid var(--border-input);
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.theme-toggle:hover {
  border-color: var(--border-hover);
  color: var(--accent);
  background: var(--accent-bg);
}

/* ── Difficulty sections ── */
.difficulty-label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
}
.difficulty-label .line { flex: 1; height: 1px; }
.difficulty-label.legendary { color: var(--accent); }
.difficulty-label.legendary .line { background: linear-gradient(90deg, rgba(191,154,38,0.3), transparent); }
.difficulty-label.epic { color: #c084fc; }
.difficulty-label.epic .line { background: linear-gradient(90deg, rgba(168,85,247,0.3), transparent); }
.difficulty-label.rare { color: #60a5fa; }
.difficulty-label.rare .line { background: linear-gradient(90deg, rgba(59,130,246,0.3), transparent); }
.difficulty-label.common { color: var(--text-muted); }
.difficulty-label.common .line { background: linear-gradient(90deg, rgba(150,150,150,0.2), transparent); }

/* ── Category tabs ── */
.category-tabs {
  max-width: 960px;
  margin: 0 auto 20px;
  padding: 0 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.cat-tab {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border-default);
  border-radius: 20px;
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.25s;
}
.cat-tab:hover { color: var(--text-secondary); border-color: var(--border-hover); }
.cat-tab.active {
  background: var(--accent-bg);
  border-color: var(--accent-border);
  color: var(--accent);
}

/* ── Grid ── */
.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px 60px;
}
.achievement-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 14px;
}

/* ── Card: LOCKED (grey/dark) ── */
.achievement-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-default);
  border-radius: 14px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.3s ease forwards;
  opacity: 0;
  transform: translateY(6px);
}
@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}
.achievement-card.locked {
  background: var(--bg-card-locked);
  border-color: rgba(255,255,255,0.04);
}
[data-theme="light"] .achievement-card.locked {
  border-color: rgba(0,0,0,0.04);
}
.achievement-card.locked .icon-box {
  background: rgba(255,255,255,0.03);
  border-color: rgba(255,255,255,0.06);
}
[data-theme="light"] .achievement-card.locked .icon-box {
  background: rgba(0,0,0,0.02);
  border-color: rgba(0,0,0,0.06);
}
.achievement-card.locked .icon-svg {
  stroke: var(--icon-locked-stroke);
  opacity: 0.4;
}
.achievement-card.locked .card-title { color: var(--text-title-locked); }
.achievement-card.locked .card-desc { color: var(--text-desc-locked); }
.achievement-card.locked .rate-text { color: var(--text-dimmer); }
.achievement-card.locked .rate-text span { color: var(--text-dim); }
.achievement-card.locked .rate-bar-bg { background: var(--rate-bar-bg); }
.achievement-card.locked .rate-bar-fill {
  background: var(--rate-bar-locked);
}
.achievement-card.locked .card-footer {
  border-top-color: rgba(255,255,255,0.03);
}
[data-theme="light"] .achievement-card.locked .card-footer {
  border-top-color: rgba(0,0,0,0.03);
}
.achievement-card.locked .rarity-indicator { opacity: 0.35; }
.achievement-card.locked:hover {
  border-color: var(--border-hover);
  background: #121218;
  transform: translateY(-2px);
}
[data-theme="light"] .achievement-card.locked:hover {
  background: #eaeae5;
}
.achievement-card.locked:hover .icon-svg {
  stroke: #555;
  opacity: 0.7;
}
[data-theme="light"] .achievement-card.locked:hover .icon-svg {
  stroke: #aaa;
}
.achievement-card.locked:hover .card-title { color: #666; }
[data-theme="light"] .achievement-card.locked:hover .card-title { color: #888; }

/* ── Card: UNLOCKED (golden highlight) ── */
.achievement-card.unlocked {
  background: var(--bg-card-unlocked);
  border-color: var(--accent-border);
  box-shadow: 0 0 0 rgba(191,154,38,0), inset 0 0 20px rgba(191,154,38,0.02);
  transition: all 0.2s ease;
}
.achievement-card.unlocked::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(191,154,38,0.5), transparent);
}
[data-theme="light"] .achievement-card.unlocked::before {
  background: linear-gradient(90deg, transparent, rgba(139,105,20,0.5), transparent);
}
.achievement-card.unlocked .icon-box {
  background: linear-gradient(135deg, rgba(191,154,38,0.15) 0%, rgba(191,154,38,0.04) 100%);
  border-color: rgba(191,154,38,0.25);
  transition: all 0.2s ease;
}
[data-theme="light"] .achievement-card.unlocked .icon-box {
  background: linear-gradient(135deg, rgba(139,105,20,0.15) 0%, rgba(139,105,20,0.04) 100%);
  border-color: rgba(139,105,20,0.25);
}
.achievement-card.unlocked .icon-svg {
  stroke: var(--icon-unlocked-stroke);
  filter: drop-shadow(0 0 3px rgba(191,154,38,0.3));
  transition: all 0.2s ease;
}
.achievement-card.unlocked .card-title { color: #f5e6a3; transition: color 0.2s ease; }
[data-theme="light"] .achievement-card.unlocked .card-title { color: #8B6914; }
.achievement-card.unlocked .card-desc { color: var(--text-secondary); transition: color 0.2s ease; }
.achievement-card.unlocked .rate-bar-fill {
  background: var(--rate-bar-unlocked);
  transition: width 0.4s ease;
}
.achievement-card.unlocked:hover {
  border-color: rgba(191,154,38,0.4);
  box-shadow: 0 2px 16px rgba(0,0,0,0.3), 0 0 20px rgba(191,154,38,0.05);
  transform: translateY(-2px);
  transition: all 0.15s ease;
}
[data-theme="light"] .achievement-card.unlocked:hover {
  border-color: rgba(139,105,20,0.4);
  box-shadow: 0 2px 16px rgba(0,0,0,0.1), 0 0 20px rgba(139,105,20,0.05);
}

/* ── Card layout ── */
.card-top {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.icon-box {
  width: 54px;
  height: 54px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
  transition: all 0.35s;
}
.icon-box .icon-svg {
  width: 30px;
  height: 30px;
  fill: none;
  stroke-width: 1.6;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: all 0.35s;
}
.icon-box .sparkles {
  position: absolute;
  top: -4px;
  right: -4px;
  font-size: 10px;
  color: var(--accent-light);
  filter: drop-shadow(0 0 4px rgba(191,154,38,0.6));
  animation: twinkle 1s ease infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}
.card-info { flex: 1; min-width: 0; }
.card-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 5px;
  transition: color 0.35s;
}
.card-desc {
  font-size: 12.5px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  transition: color 0.35s;
  color: var(--text-secondary);
}
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding-top: 11px;
  border-top: 1px solid var(--border-default);
  transition: border-color 0.35s;
}
.rate-bar-container { flex: 1; margin-right: 14px; }
.rate-bar-bg {
  height: 4px;
  background: var(--rate-bar-bg);
  border-radius: 3px;
  overflow: hidden;
}
.rate-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease;
  width: 0%;
}
.rate-text {
  font-size: 10.5px;
  margin-top: 4px;
  transition: color 0.35s;
  color: var(--text-dim);
}

/* ── Rarity badge ── */
.rarity-indicator {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 10.5px;
  font-weight: 500;
  flex-shrink: 0;
  transition: all 0.35s;
}
.rarity-common { background: rgba(120,120,120,0.08); color: #666; border: 1px solid rgba(120,120,120,0.12); }
.rarity-rare { background: rgba(59,130,246,0.08); color: #5090e0; border: 1px solid rgba(59,130,246,0.15); }
.rarity-epic { background: rgba(168,85,247,0.08); color: #a86fe0; border: 1px solid rgba(168,85,247,0.15); }
.rarity-legendary { background: rgba(191,154,38,0.08); color: var(--accent); border: 1px solid var(--accent-border); }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dimmer);
}
.empty-state .empty-icon { font-size: 42px; margin-bottom: 14px; opacity: 0.25; }

/* ── Footer ── */
.footer-note {
  text-align: center;
  padding: 24px 20px 40px;
  color: var(--text-dimmer);
  font-size: 11px;
  letter-spacing: 1px;
}

/* ── Modal ── */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  justify-content: center;
  align-items: center;
  padding: 20px;
}
[data-theme="light"] .modal-backdrop {
  background: rgba(0,0,0,0.5);
}
.modal-backdrop.show { display: flex; }
.modal {
  background: var(--bg-modal);
  border: 1px solid var(--accent-border);
  border-radius: 18px;
  max-width: 480px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 30px 26px;
  position: relative;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  background: none;
  border: 1px solid var(--modal-close-border, var(--border-input));
  color: var(--text-dim);
  width: 30px; height: 30px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover { color: var(--text-secondary); border-color: var(--border-hover); }
[data-theme="light"] .modal-close {
  --modal-close-border: rgba(0,0,0,0.08);
}

.modal-icon-wrap { text-align: center; margin-bottom: 18px; }
.modal-icon {
  width: 72px; height: 72px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(191,154,38,0.12), rgba(191,154,38,0.02));
  border: 1px solid rgba(191,154,38,0.18);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
[data-theme="light"] .modal-icon {
  background: linear-gradient(135deg, rgba(139,105,20,0.12), rgba(139,105,20,0.02));
  border: 1px solid rgba(139,105,20,0.18);
}
.modal-icon .icon-svg {
  width: 40px; height: 40px;
  fill: none; stroke: var(--accent);
  stroke-width: 1.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.modal-icon.locked-icon {
  background: rgba(255,255,255,0.02);
  border-color: rgba(255,255,255,0.06);
}
[data-theme="light"] .modal-icon.locked-icon {
  background: rgba(0,0,0,0.02);
  border-color: rgba(0,0,0,0.06);
}
.modal-icon.locked-icon .icon-svg { stroke: var(--icon-locked-stroke); opacity: 0.5; }
.modal-cat-tag {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 10px;
  font-size: 11px;
  background: rgba(191,154,38,0.06);
  color: var(--text-muted);
  border: 1px solid var(--border-default);
  margin-bottom: 14px;
}
[data-theme="light"] .modal-cat-tag {
  background: rgba(139,105,20,0.06);
}
.modal-title {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  color: #e8d8a0;
  margin-bottom: 8px;
}
[data-theme="light"] .modal-title { color: #8B6914; }
.modal-title.locked-title { color: var(--text-dim); }
.modal-desc {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 18px;
  line-height: 1.6;
}
.modal-desc.locked-desc { color: var(--text-dimmer); }
.modal-stats {
  display: flex;
  justify-content: center;
  gap: 28px;
  margin-bottom: 20px;
}
.modal-stat { text-align: center; }
.modal-stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
.modal-stat-num.locked-stat { color: var(--text-dimmer); }
.modal-stat-label { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; }
.modal-story {
  background: rgba(255,255,255,0.02);
  border-radius: 10px;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.04);
  margin-bottom: 18px;
}
[data-theme="light"] .modal-story {
  background: rgba(0,0,0,0.02);
  border-color: rgba(0,0,0,0.04);
}
.modal-story-label { color: var(--text-dim); font-size: 11px; margin-bottom: 7px; }
.modal-story-text { color: var(--text-secondary); font-size: 13px; line-height: 1.75; }
.modal-toggle-btn {
  display: block;
  margin: 0 auto;
  padding: 9px 28px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.25s;
  border: 1px solid var(--accent-border);
  background: var(--accent-bg);
  color: var(--accent);
}
.modal-toggle-btn:hover {
  background: rgba(191,154,38,0.12);
  border-color: rgba(191,154,38,0.35);
}
[data-theme="light"] .modal-toggle-btn:hover {
  background: rgba(139,105,20,0.12);
  border-color: rgba(139,105,20,0.35);
}
.modal-toggle-btn.locked-btn {
  border-color: var(--border-input);
  background: var(--bg-toolbar-btn);
  color: var(--text-muted);
}
.modal-toggle-btn.locked-btn:hover {
  border-color: var(--accent-border);
  color: var(--accent);
}

/* ── Toast notification ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-toast);
  border: 1px solid var(--accent-border);
  color: var(--text-primary);
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 13px;
  z-index: 200;
  opacity: 0;
  transition: all 0.4s ease;
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
[data-theme="light"] .toast {
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Responsive ── */
@media (max-width: 520px) {
  .achievement-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 24px; letter-spacing: 3px; }
  .stat-item { padding: 10px 16px; min-width: 100px; }
  .stat-number { font-size: 20px; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .toolbar-btns { justify-content: center; }
  .modal { padding: 22px 18px; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-bg); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>地球 Online</h1>
  <div class="subtitle">Achievement System · 人生成就系统</div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="搜索成就名称或描述...">
  </div>
  <div class="toolbar-btns">
    <button class="sort-btn active" id="sortBtn" onclick="toggleSort()">
      解锁难度 <span class="arrow">&#9650;</span>
    </button>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">
      <span id="themeIcon">&#127769;</span>
    </button>
    <button class="action-btn export-btn" onclick="exportProgress()" title="导出存档到文件">
      &#128229; 导出
    </button>
    <button class="action-btn export-btn" onclick="exportImage()" title="导出成就卡片为一图流图片">
      &#128247; 导出图片
    </button>
    <button class="action-btn export-btn" onclick="document.getElementById('importFile').click()" title="从文件导入存档">
      &#128228; 导入
    </button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProgress(this)">
    <button class="action-btn danger" onclick="resetProgress()" title="清除本地存档，恢复初始状态">
      &#8634; 重置
    </button>
  </div>
</div>

<div class="category-tabs" id="categoryTabs"></div>

<div class="container" id="mainContainer">
  <div class="achievement-grid" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">&#128270;</div>
    <p>没有找到匹配的成就</p>
  </div>
</div>

<div class="footer-note">
  地球Online v2026.06 · 每个人都是自己人生的主角
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Achievement Data (60 achievements) ──
const achievements = [
  { id:1, title:"全款置业", desc:"无贷款拥有一个属于自己的家", rate:4, category:"生活", rarity:"legendary",
    story:"你一次性付清了房款，销售看着你的转账记录愣了三秒。你拿到了房产证，上面只有你一个名字——这是地球上最难获得的成就之一。" },
  { id:2, title:"财富自由", desc:"被动收入覆盖生活支出", rate:5.2, category:"职业", rarity:"epic",
    story:"你不再需要为账单担心，不再需要在不想工作的日子里强迫自己去上班。你终于拥有了地球上最昂贵的东西——自由。但你也发现，真正让人快乐的不是钱本身，而是钱带来的选择权。" },
  { id:3, title:"游戏收藏家", desc:"入手多款游戏主机设备", rate:5.9, category:"兴趣", rarity:"epic",
    story:"你的柜子里摆满了各世代主机：Switch、PS5、Xbox、还有那些早已停产的经典机型。每一台都承载着不同年代的游戏回忆。你不是在收集机器，而是在收藏一段段青春。" },
  { id:4, title:"走过五大洲", desc:"在地球上的每个大洲都留下足迹", rate:7, category:"旅行", rarity:"epic",
    story:"你在七大洲都留下了自己的足迹。从南极的冰川到非洲的草原，从欧洲的古镇到南美的雨林——你用脚步丈量了这颗星球，它比你想象的更美丽、更脆弱、更值得被珍惜。" },
  { id:5, title:"自律传说", desc:"连续365天每天早起，坚持自律生活", rate:7, category:"成长", rarity:"epic",
    story:"这是地球上最难达成的成就之一。你需要每天对抗床的引力、手机的诱惑、疲劳的侵袭。但那些早起的时间，那些安静的清晨，最终会变成你人生中最宝贵的财富。恭喜你，你已超越了99%的玩家。" },
  { id:6, title:"跑完一场马拉松", desc:"42.195公里，用双脚丈量极限", rate:8, category:"兴趣", rarity:"epic",
    story:"35公里的时候你差点放弃，腿像灌了铅，心肺像被人攥住。但当你拐过最后一个弯道看到终点线的时候，你用尽最后一丝力气冲了过去。奖牌挂上脖子的那一刻，你已经在想下一马拉松了。" },
  { id:7, title:"零负债", desc:"无房贷、车贷、网贷，真正无债一身轻", rate:9, category:"财务", rarity:"epic",
    story:"在这个人人负债的时代，你居然做到了零负债。没有房贷的压力，没有信用卡账单的焦虑，你活得比大多数人轻松得多。这不是因为你赚得多，而是因为你懂得控制欲望。" },
  { id:8, title:"双语达人", desc:"掌握一门母语以外的语言", rate:9.3, category:"技能", rarity:"epic",
    story:"从ABC开始，你花了好几年才终于能用另一种语言流利表达。这门语言为你打开了一扇窗，让你看到了不一样的风景，认识了不一样的人。世界因此变得更大了。" },
  { id:9, title:"露营初体验", desc:"体验户外野外露营过夜", rate:10.3, category:"旅行", rarity:"rare",
    story:"帐篷外的篝火噼啪作响，满天繁星近在咫尺，远处传来虫鸣和风声。城市的光污染在这里不存在。你躺在睡袋里，第一次看清了银河的全貌——原来夜空这么美。" },
  { id:10, title:"减肥20斤", desc:"用自律战胜地心引力", rate:11, category:"成长", rarity:"rare",
    story:"你戒掉了宵夜，每天去健身房，对着体重秤上的数字怀疑人生。但当有一天你穿上那条曾经穿不进去的裤子，拉链顺畅地拉上去——那一刻，你觉得自己无所不能。" },
  { id:11, title:"海外旅行", desc:"拥有一次国外旅行的经历", rate:11, category:"旅行", rarity:"rare",
    story:"护照盖上了第一个入境印章，你站在异国街头，空气是陌生的，语言是不熟悉的，但你的内心充满了兴奋。世界比你想象的更大、更多彩，而你才刚刚开始探索它的第一步。" },
  { id:12, title:"千里奔赴", desc:"跨越千里只为见一个人", rate:11.6, category:"社交", rarity:"rare",
    story:"你买了一张机票/火车票，穿越了大半个中国，只为了见那个人一面。见面时可能只是吃一顿饭、散一圈步，但这份跨越千里的心意，比什么都珍贵。" },
  { id:13, title:"看一次极光", desc:"在北极圈附近目睹大自然的灯光秀", rate:12, category:"旅行", rarity:"rare",
    story:"你在零下二十度的夜里等了三个小时，当绿色的光幕在头顶舞动时，你忘记了寒冷。那是你一生中见过的最美的光——它不属于任何城市，只属于这颗星球本身。" },
  { id:14, title:"挚友羁绊", desc:"拥有相处10年以上、可以完全无条件信任的挚友", rate:13, category:"社交", rarity:"rare",
    story:"十年了，你们见过彼此最狼狈的样子，分享过最深藏的秘密，吵过架又和好。在这个人来人往的世界里，有一个人始终在那里——这比什么都珍贵。" },
  { id:15, title:"五年坚持", desc:"坚持一件爱好5年以上从未放弃", rate:13, category:"兴趣", rarity:"rare",
    story:"五年了，你还在画画/跑步/写作/摄影/弹琴。周围的人换了又换，但这件小事你一直坚持着。它不一定给你带来名利，但它让你的灵魂有一个可以栖息的地方。" },
  { id:16, title:"坚持记账一年", desc:"清楚每一分钱的去向", rate:14, category:"生活", rarity:"rare",
    story:"你坚持记录每一笔开销，一年后发现：原来你花了那么多钱在奶茶上。你开始重新思考什么才是真正值得的消费——这不是抠门，这是对自己劳动成果的尊重。" },
  { id:17, title:"创业", desc:"创建自己的组织", rate:15, category:"职业", rarity:"rare",
    story:"你辞掉了稳定的工作，用积蓄注册了一家公司。前三个月你没有收入，每天都在焦虑中度过。但当第一笔订单进账的时候，你看着那个数字，哭了。" },
  { id:18, title:"24小时不眠", desc:"超过24小时不睡觉", rate:16.7, category:"成长", rarity:"rare",
    story:"你盯着时钟，数字跳到了24小时以上。眼皮沉重，大脑迟钝，但你就是睡不着。也许是压力，也许是亢奋，也许只是单纯的失眠。无论如何，你正在挑战人类生理极限。" },
  { id:19, title:"跨过大半个球", desc:"到达与自己所在时区相差超过6小时的地方", rate:18, category:"成长", rarity:"rare",
    story:"你坐了十几个小时的飞机，落地时身体告诉你是凌晨三点，窗外却是烈日当空。你站在异国的街头，突然意识到：世界比你想象的要大得多。" },
  { id:20, title:"方言达人", desc:"熟练掌握2种及以上地方方言", rate:18.3, category:"技能", rarity:"rare",
    story:"你不仅能说普通话，还能用两种以上方言和当地人无缝交流。每一种方言背后都是一个地域的文化密码，而你掌握了其中的好几把钥匙。" },
  { id:21, title:"极限学习", desc:"非上课时间一天学习超过10个小时", rate:18.6, category:"学业", rarity:"rare",
    story:"凌晨两点你还在刷题，室友说你疯了。你不知道自己在坚持什么，只是不想输给那些比你努力的人。多年以后回想起来，那段拼命的日子，是你人生中最纯粹的时光。" },
  { id:22, title:"读完50本书", desc:"解锁「终身学习」成就", rate:19, category:"兴趣", rarity:"rare",

  { id:23, title:"睡眠冠军", desc:"成功单日睡眠达10小时以上", rate:19.3, category:"健康", rarity:"rare",

  { id:24, title:"坚持一个习惯100天", desc:"用行动证明自律不是鸡汤", rate:21, category:"成长", rarity:"rare",

  { id:25, title:"说走就走", desc:"临时起意，即兴开启一段旅程", rate:21.7, category:"旅行", rarity:"rare",

  { id:26, title:"献血", desc:"用400ml血液拯救陌生人的生命", rate:22, category:"社交", rarity:"rare",

  { id:27, title:"手工达人", desc:"独立完成手工DIY制作作品", rate:22.1, category:"兴趣", rarity:"rare",

  { id:28, title:"博士毕业", desc:"获得博士学位，成为某个细分领域的专家", rate:23, category:"学业", rarity:"rare",

  { id:30, title:"电影爱好者", desc:"一年累计观看电影超30部", rate:23.5, category:"娱乐", rarity:"rare",

  { id:31, title:"装修小能手", desc:"亲手打造梦想中的居住空间", rate:25, category:"生活", rarity:"rare",

  { id:32, title:"学会一种乐器", desc:"用音乐表达无法言说的心情", rate:26, category:"兴趣", rarity:"rare",

  { id:33, title:"经济独立", desc:"解锁「经济独立」被动，不再依赖原生家庭补贴", rate:27, category:"生活", rarity:"rare",

  { id:34, title:"家庭聚餐组织者", desc:"成为家庭聚会的策划者和核心人物", rate:28, category:"家庭", rarity:"rare",

  { id:35, title:"极简社交", desc:"只维持3个以内的核心好友关系", rate:28.4, category:"社交", rarity:"rare",
    story:"你的通讯录里人很多，但真正的朋友只有两三个。你不热衷于社交，也不觉得孤独。质量永远大于数量——这几个知己，胜过千百个点赞之交。" },
  { id:36, title:"在陌生人面前公开演讲", desc:"克服恐惧，用声音影响他人", rate:29, category:"成长", rarity:"rare",

  { id:37, title:"毛孩子陪伴", desc:"养宠猫狗超过5年，朝夕相伴", rate:29.3, category:"生活", rarity:"rare",

  { id:38, title:"在异国他乡遇到同胞", desc:"解锁「他乡遇故知」成就", rate:30, category:"社交", rarity:"rare",
    story:"你在异国的街头听到熟悉的语言，那种亲切感瞬间淹没了你。你们聊了很久，交换了联系方式，然后各自继续旅行。但那个下午的咖啡，你永远不会忘记。" },
  { id:39, title:"掌握第二语言", desc:"解锁与另一个文化沟通的技能", rate:32, category:"技能", rarity:"rare",
    story:"你花了数年时间背诵单词、练习发音，终于有一天，你用另一种语言流畅地讲述了一个笑话——对方笑了。那一刻你知道，你真正掌握了这门语言。" },
  { id:40, title:"买房签约", desc:"在地球上拥有一个永久坐标", rate:32, category:"生活", rarity:"rare",
    story:"你在购房合同上签下了自己的名字，那一刻你背负了未来二十年的承诺。但当你拿到钥匙打开新家的门，你知道这一切都值得。" },
  { id:41, title:"短视频沉迷", desc:"连续8小时不间断刷视频，全程不离屏幕", rate:32, category:"娱乐", rarity:"rare",
    story:"本来只想刷五分钟放松一下，结果一抬头天已经黑了。手机电量从80%掉到5%，你的脖子酸痛，但手指却停不下来。算法比你更了解你自己——这才是最可怕的地方。" },
  { id:42, title:"养一盆植物并让它活过一年", desc:"解锁「生命养育」初级成就", rate:33, category:"生活", rarity:"rare",
    story:"你浇水、施肥、晒太阳，那盆绿萝居然真的活了一年！你骄傲地拍了照片发朋友圈，配文「终于不是植物杀手了」。那一刻你懂了，原来养育生命这件事，比想象中更需要耐心。" },
  { id:43, title:"出国旅行", desc:"踏足另一个国家", rate:35, category:"旅行", rarity:"rare",
    story:"你走下飞机，空气里弥漫着陌生的味道，路牌上的文字你看不懂，但你的心里充满了兴奋。原来世界真的很大，大到你用一生也走不完。" },
  { id:44, title:"泪失禁体质", desc:"为十部以上影视作品感动落泪", rate:35.3, category:"娱乐", rarity:"rare",
    story:"你不是一个爱哭的人，但有些电影/电视剧就是能让你的眼泪止不住。第十次在电影院抹眼泪的时候你认了——敏感不是弱点，它是感受力的证明。" },
  { id:45, title:"自驾旅行", desc:"拥有一次驾车出行的旅游经历", rate:35.4, category:"旅行", rarity:"rare",
    story:"你握着方向盘，载着好友或爱人，沿着海岸线一路向南。音乐开着，窗摇下来，风吹进来，你们大声唱歌。这条路没有终点，但沿途的风景本身就是目的。" },
  { id:46, title:"学会拒绝", desc:"勇敢地对不合理的要求说不", rate:36, category:"成长", rarity:"rare",
    story:"你第一次说「不」的时候，心里忐忑不安，以为世界会崩塌。但什么都没有发生——相反，你感到一种前所未有的轻松。原来，说「不」也是一种能力。" },
  { id:47, title:"睡眠不足", desc:"平均每日睡眠少于7小时", rate:36.2, category:"健康", rarity:"rare",
    story:"六小时的睡眠已成常态，你习惯了用咖啡因对抗困倦。你告诉自己这是奋斗的代价，但你也知道，身体总有一天会来讨债的。" },
  { id:48, title:"长期单身", desc:"成年后连续单身4年以上，从未开启长期恋爱支线", rate:37, category:"情感", rarity:"rare",
    story:"朋友们一个个脱单、结婚、生娃，而你依然单身。有时候你也会焦虑，但更多时候你觉得自由真好。爱情这件事，急不来，也勉强不来。" },
  { id:49, title:"带家人吃顿豪华大餐", desc:"用自己的钱请家人吃一顿贵的", rate:38, category:"家庭", rarity:"rare",
    story:"你订了一家一直想带家人去却舍不得去的餐厅。看着父母脸上既心疼又骄傲的表情，你知道这顿饭值得——不是因为食物有多好吃，而是因为你能回报他们的养育之恩了。" },
  { id:50, title:"高等教育毕业", desc:"成功通过高等教育，拿到大学毕业证", rate:38, category:"学业", rarity:"rare",
    story:"你穿着学位服在校园里走了一圈又一圈，想把这里的每一条路都记住。四年青春换来一张纸，但你清楚知道，这张纸背后的故事，才是真正属于你的财富。" },
  { id:51, title:"追剧达人", desc:"完整追完10部长篇剧集", rate:38.2, category:"娱乐", rarity:"rare",
    story:"你熬夜追完了一部又一部剧，为角色的命运揪心，为剧情的反转惊叹。十部剧，几百个小时，你活在了一个又一个平行世界里。追剧不只是消遣，更是对另一种人生的体验。" },
  { id:52, title:"帮助陌生人", desc:"无条件帮助一个素不相识的人", rate:40, category:"社交", rarity:"rare",
    story:"你在雨天给没带伞的陌生人撑了一段路，或者帮迷路的人指了路。他们对你说「谢谢」的时候，你突然明白：善良是这个游戏里最强大的技能，没有之一。" },
  { id:53, title:"参加一场演唱会", desc:"在现场感受音乐的力量", rate:42, category:"娱乐", rarity:"rare",
    story:"当灯光暗下又骤然亮起，舞台上的TA唱起了你最喜欢的歌。你跟着几万人一起合唱，那一刻你确信：音乐是这个星球上最接近魔法的事物。" },
  { id:54, title:"硕士研究生", desc:"获得硕士学位", rate:43, category:"学业", rarity:"rare",
    story:"你在图书馆度过无数个深夜，终于完成了那篇几十页的论文。答辩那天，你站在讲台上，从容地回答每一个问题——你知道，你做到了。" },
  { id:55, title:"异乡奋斗者", desc:"背井离乡在外打拼，一年回家不超过2次", rate:43, category:"职业", rarity:"rare",
    story:"你拖着行李箱来到这座陌生的城市，出租屋很小，工作很累，但每个月往家里打钱的时候，你觉得一切都值了。你是一座桥，一头连着故乡，一头连着远方。" },
  { id:56, title:"享受独处", desc:"习惯一人吃饭出行逛街，享受独处时光", rate:43, category:"成长", rarity:"rare",
    story:"一个人吃火锅，一个人看电影，一个人旅行——你不再觉得尴尬，反而享受这种自由。你学会了与自己相处，而这可能是人这一生中最重要的一项能力。" },
  { id:57, title:"登顶高峰", desc:"徒步登顶高山俯瞰大地", rate:43.5, category:"旅行", rarity:"rare",
    story:"最后几百米是最难的，每一步都需要调动全身的力气。但当终于站上山顶，云海在脚下翻涌，群山如波浪般延展——你明白了为什么要爬山：不是为了到达，是为了看见。" },
  { id:58, title:"陪父母旅行", desc:"长大后在旅途中重新认识父母", rate:45, category:"家庭", rarity:"rare",
    story:"你带着父母去旅行，就像当年他们带你去看世界一样。你发现父亲的步子慢了，母亲的记性不如从前了。你突然意识到：你正在成为他们的依靠，就像他们曾经是你的依靠一样。" },
  { id:59, title:"成为父母", desc:"解锁「养育」副本，持续终身", rate:48, category:"情感", rarity:"rare",
    story:"你第一次抱起那个小小的生命，TA那么软、那么轻，却又那么真实地存在着。那一刻你突然明白了，原来你的父母也是这样抱着你、看着你、爱着你——二十年、三十年、四十年。" },
  { id:60, title:"升职加薪", desc:"职业能力得到认可", rate:51, category:"职业", rarity:"common",
    story:"你的老板告诉你：「你做得很好，从下个月起……」你努力保持淡定，但心里已经放起了烟花。这是你用无数个加班夜晚换来的，你值得。" },
  { id:61, title:"感恩母亲", desc:"给妈妈准备一份礼物或鲜花", rate:52.3, category:"家庭", rarity:"common",
    story:"妈妈收到你送的礼物/花的时候，嘴上说着「乱花钱」，脸上却笑开了花。她可能一辈子都不会说出来，但这一刻她是世界上最幸福的母亲。别等到母亲节才想起来。" },
  { id:62, title:"结婚", desc:"与另一个玩家签订终身契约", rate:53, category:"情感", rarity:"common",
    story:"你站在婚礼现场，看着穿着白纱的TA走向你。你想起第一次见面时的场景，没想到有一天你们会站在这里，在所有人面前承诺：无论贫穷富贵，健康疾病，都不离不弃。" },
  { id:63, title:"看完100部电影", desc:"解锁「电影爱好者」称号", rate:55, category:"娱乐", rarity:"common",
    story:"你在黑暗的影厅里笑过、哭过、思考过。第一百部电影看完的时候，你突然发现——你看的不是电影，是无数种人生的可能性。" },
  { id:64, title:"不忘初心", desc:"成年后仍守住年少热爱", rate:55, category:"成长", rarity:"common",
    story:"小时候你喜欢画画/音乐/写作/运动，长大后大家都劝你务实，但你偷偷保留着那份热爱。某天深夜你重新拿起画笔/吉他/笔，发现那个少年还在你身体里，从未离开。" },
  { id:65, title:"独自旅行", desc:"一个人出发，去一个完全陌生的地方", rate:58, category:"成长", rarity:"common",
    story:"你拖着行李箱站在陌生的街头，没有导游，没有攻略，只有你自己。那一刻你感到害怕，但也感到无比自由——这是你真正独立的开始。" },
  { id:66, title:"公共交通族", desc:"常年依赖地铁公交日常出行", rate:59.2, category:"生活", rarity:"common",
    story:"你对这座城市每一条地铁线路的换乘站如数家珍。早高峰挤地铁的技巧你已经炉火纯青。你不是没有买车的能力，只是觉得公共交通也是一种生活方式。" },
  { id:67, title:"通关一个游戏", desc:"在不看攻略的情况下通关一款游戏", rate:60, category:"娱乐", rarity:"common",
    story:"你在游戏里死了无数次，卡关卡到想砸键盘，但当你终于看到制作人员名单滚动时，那种成就感让你觉得一切都值得。后来你才知道——原来真结局还需要再打三周目。" },
  { id:68, title:"空想家", desc:"想法太多始终迈不出动手那一步", rate:60.7, category:"成长", rarity:"common",
    story:"你有无数个计划：学吉他、练英语、开一家咖啡店、环游世界……但它们全都停留在你的脑海里，没有一个变成现实。也许有一天你会迈出第一步，也许不会。但至少，你还拥有做梦的权利。" },
  { id:69, title:"遗憾分手", desc:"认真爱过一个，最终没能走到最后", rate:61, category:"情感", rarity:"common",
    story:"你们认真过，努力过，也争吵过、妥协过，最终还是走散了。你删掉了合照，取关了社交账号，但某些歌你还是不敢听。遗憾是成长的代价，但至少，你学会了如何去爱。" },
  { id:70, title:"交到一辈子朋友", desc:"有一个认识10年以上的朋友", rate:62, category:"社交", rarity:"common",
    story:"你们认识了十年，从校服到婚纱（或者从单身到单身），从QQ空间到微信朋友圈。你们之间有很多共同记忆，也有很多共同的秘密——这就是一辈子朋友的意义。" },
  { id:71, title:"双向奔赴", desc:"向喜欢的人表白，结果对方也喜欢你", rate:63, category:"情感", rarity:"common",
    story:"你鼓起全部勇气说出「我喜欢你」，心跳快到要从嗓子眼里蹦出来。然后TA笑了——那种笑容告诉你：原来你也一直在等这句话。双向奔赴的爱，是这个世界上最美好的事。" },
  { id:72, title:"学会做饭", desc:"解锁「料理」生活技能", rate:65, category:"技能", rarity:"common",
    story:"你第一次独立做出一顿能吃的饭。虽然厨房像战场，虽然盐放多了，但当你吃到自己做的菜时，那种成就感无可替代。" },
  { id:73, title:"注意力被劫持", desc:"本想查资料/学习，结果刷了几个小时视频", rate:65.3, category:"娱乐", rarity:"common",
    story:"你打开手机本来是想搜一道题/查一个资料，结果三个小时后你正对着屏幕傻笑。推荐算法把你带进了一个全新的世界——而你甚至不记得是怎么进来的。" },
  { id:74, title:"自我疗愈", desc:"低谷时期自我调节，不靠他人走出阴霾", rate:67, category:"成长", rarity:"common",
    story:"那段日子很灰暗，你不想见任何人，也不想说话。但你每天逼自己做一点小事：洗个澡、出门走走、吃顿好的。慢慢地，光透进来了。你救了自己，而这份力量将伴随你一生。" },
  { id:75, title:"第一次租房", desc:"在陌生的城市找到一个属于自己的角落", rate:68, category:"生活", rarity:"common",
    story:"你签下了人生第一份租房合同，虽然房子不大，虽然墙面有点发霉，但这是你第一次拥有一个真正属于自己的空间。" },
  { id:76, title:"独自生活", desc:"第一次不依赖父母，独立居住", rate:70, category:"生活", rarity:"common",
    story:"你提着行李站在出租屋门口，钥匙插入锁孔的那一刻，你意识到：从现在开始，没有人会提醒你天冷加衣、按时吃饭。你既是自己的监护人，也是自己的孩子。" },
  { id:77, title:"打卡5A级景区", desc:"参观中国最高评级的旅游景区", rate:72, category:"旅行", rarity:"common",
    story:"你排队两小时，打卡五分钟。虽然人多到怀疑人生，但当站在那处传世美景前，你承认——确实值得。" },
  { id:78, title:"满分战绩", desc:"考试获得过满分", rate:72, category:"学业", rarity:"common",
    story:"试卷发下来的时候，你不敢相信自己的眼睛——满分！老师在全班同学面前念出你的名字，那一刻你觉得自己可能是天才。后来你才知道，那可能只是你人生中为数不多的高光时刻。" },
  { id:79, title:"垂钓爱好者", desc:"每周户外垂钓享受安静独处时光", rate:72, category:"兴趣", rarity:"common",
    story:"你坐在水边，鱼竿一动不动，世界安静得只剩下水流声和鸟鸣。钓不钓得到鱼并不重要，重要的是这几小时的放空与安宁。钓鱼的人不是在钓鱼，是在和自己对话。" },
  { id:80, title:"本科毕业", desc:"获得学士学位", rate:75, category:"学业", rarity:"common",
    story:"你穿着学士服，把帽穗从右边拨到左边。四年的熬夜、考试、恋爱、迷茫，在这一刻画上了句号。" },
  { id:81, title:"故人走散", desc:"和年少最好的朋友，慢慢淡出彼此生活", rate:75, category:"社交", rarity:"common",
    story:"你们曾经形影不离，无话不说。然后各自去了不同的城市，有了不同的圈子。聊天记录停留在去年的生日祝福。你不难过，只是偶尔会想：TA现在过得好吗？" },
  { id:82, title:"拿到驾照", desc:"解锁「机动车」使用权", rate:78, category:"技能", rarity:"common",
    story:"你紧张地握着方向盘，教练在副驾踩了无数次副刹。终于，你拿到了那张小本子——从此，你可以去任何想去的地方（只要付得起油费）。" },
  { id:83, title:"外卖依赖者", desc:"连续一周三餐全靠外卖续命，零下厨", rate:78, category:"生活", rarity:"common",
    story:"你的厨房积了一层灰，外卖小哥成了你最熟悉的人。连续七天没有开火，你的胃在抗议，但你的懒惰在欢呼——毕竟谁愿意洗碗呢？" },
  { id:84, title:"岁岁平安", desc:"一生无重大意外灾祸，生活安稳顺遂", rate:78, category:"生活", rarity:"common",
    story:"你可能觉得自己的人生平平淡淡，没有什么波澜壮阔的故事。但你知道吗？能够平平安安地长大、变老，本身就是一种了不起的幸运。平安，是最大的奢侈。" },
  { id:85, title:"落日收藏家", desc:"特意奔赴多地拍摄日落美景", rate:78, category:"兴趣", rarity:"common",
    story:"你有一个相册专门存放日落照片：海边、山顶、城市天台、机场跑道……每一次日落都不一样，但每一场都同样壮美。你追逐的不是太阳，而是那一瞬间的宁静与感动。" },
  { id:86, title:"学会游泳", desc:"解锁水上移动技能", rate:80, category:"技能", rarity:"common",
    story:"你被教练扔进了深水区，本能地划动手脚。当你发现自己真的浮了起来，那种征服水域的快感让你忘记了刚才的恐惧。" },
  { id:87, title:"第一次喝醉", desc:"体验酒精的副作用", rate:82, category:"成长", rarity:"common",
    story:"你在聚会中第一次喝醉，醒来时头疼欲裂，发誓再也不喝酒了。但你知道吗？人类最迷人的地方就是——我们总是会忘记疼痛，重复同样的错误。" },
  { id:88, title:"第一次说「我爱你」", desc:"向另一个人完全敞开心扉", rate:82, category:"情感", rarity:"common",
    story:"你说这三个字的时候声音在发抖，你不知道对方会怎么回应。但当TA也说「我也爱你」的时候，你觉得整个世界都在为你鼓掌。" },
  { id:89, title:"月光族", desc:"每月工资花清零，存款永远趋近于归零", rate:82, category:"生活", rarity:"common",
    story:"发工资的那天是你最富有的日子，也是你消费欲望最强的一天。月底查看余额的时候，你再次发誓要存钱——但下个月的循环又会重新开始。" },
  { id:90, title:"第一份工作", desc:"解锁「打工人」身份", rate:83, category:"职业", rarity:"common",
    story:"你第一天上班，紧张得提前半小时到了公司。你不知道自己会在这个岗位待多久，但你清楚地记得那一刻的心情——终于，你是一个「大人」了。" },
  { id:91, title:"高考通关", desc:"完成人生最重要的限时考试", rate:85, category:"学业", rarity:"common",
    story:"六月的酷暑，你在考场上奋笔疾书。当最后一科结束的铃声响起，你走出考场，阳光刺眼——那是一个时代的结束，也是另一个时代的开始。" },
  { id:92, title:"第一次失恋", desc:"体验心碎的感觉，解锁「坚强」属性", rate:85, category:"成长", rarity:"common",
    story:"你删除了聊天记录，把照片锁进了只有你知道的文件夹。你在雨中走了很久，以为自己撑不过去了。但多年后你回头看，感谢那个让你心碎的人——TA让你学会了爱。" },

// ── State ──
let unlockedSet = new Set(
  JSON.parse(localStorage.getItem('earthOL_unlocked') || '[]')
);
let currentCategory = 'all';
let searchQuery = '';
let sortAsc = true; // true = 最难(rate最低)排最前

const categories = [...new Set(achievements.map(a => a.category))];

// ── Theme ──
function initTheme() {
  const savedTheme = localStorage.getItem('earthOL_theme');
  if (savedTheme) {
    setTheme(savedTheme);
  } else {
    // Default: follow system
    setTheme('system');
  }
}

function setTheme(theme) {
  let actualTheme = theme;
  if (theme === 'system') {
    actualTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  document.documentElement.setAttribute('data-theme', actualTheme);
  localStorage.setItem('earthOL_theme', theme);
  
  // Update theme toggle icon
  const icon = document.getElementById('themeIcon');
  const btn = document.getElementById('themeToggle');
  if (theme === 'system') {
    icon.innerHTML = '&#127769;';
    btn.title = '当前：跟随系统（点击切换）';
  } else if (actualTheme === 'dark') {
    icon.innerHTML = '&#127769;';
    btn.title = '当前：深色模式（点击切换）';
  } else {
    icon.innerHTML = '&#9728;';
    btn.title = '当前：浅色模式（点击切换）';
  }
  
  // Update theme-color meta
  const meta = document.getElementById('themeColorMeta');
  meta.content = actualTheme === 'dark' ? '#08080d' : '#f5f5f0';
}

function toggleTheme() {
  const current = localStorage.getItem('earthOL_theme') || 'system';
  if (current === 'system') {
    // System -> Dark
    setTheme('dark');
  } else if (current === 'dark') {
    // Dark -> Light
    setTheme('light');
  } else {
    // Light -> System
    setTheme('system');
  }
}

function saveUnlockedState() {
  localStorage.setItem('earthOL_unlocked', JSON.stringify([...unlockedSet]));
}

// ── Render Stats ──
function initStats() {
  const total = achievements.length;
  const unlocked = unlockedSet.size;
  const pct = total > 0 ? Math.round((unlocked / total) * 100) : 0;
  const legendary = achievements.filter(a => a.rarity === 'legendary').filter(a => unlockedSet.has(a.id)).length;
  const epic = achievements.filter(a => a.rarity === 'epic').filter(a => unlockedSet.has(a.id)).length;
  
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item">
      <div class="stat-number">${unlocked}/${total}</div>
      <div class="stat-label">已解锁</div>
    </div>
    <div class="stat-item">
      <div class="stat-number">${pct}%</div>
      <div class="stat-label">完成度</div>
    </div>
    <div class="stat-item">
      <div class="stat-number">${legendary}</div>
      <div class="stat-label">传说达成</div>
    </div>
    <div class="stat-item">
      <div class="stat-number">${epic}</div>
      <div class="stat-label">史诗达成</div>

}

// ── Render Category Tabs ──
function initCategoryTabs() {
  const container = document.getElementById('categoryTabs');
  let html = `<button class="cat-tab ${currentCategory==='all'?'active':''}" onclick="filterCat('all')">全部</button>`;
  categories.forEach(cat => {
    html += `<button class="cat-tab ${currentCategory===cat?'active':''}" onclick="filterCat('${cat}')">${cat}</button>`;
  });
  container.innerHTML = html;
}

// ── Get difficulty group ──
function getDifficultyGroup(rate) {
  if (rate < 5) return 'legendary';
  if (rate < 10) return 'epic';
  if (rate < 50) return 'rare';
  return 'common';
}
function getDifficultyLabel(key) {
  return { legendary:'传说 · Legendary', epic:'史诗 · Epic', rare:'稀有 · Rare', common:'普通 · Common' }[key];
}

// ── Render Grid ──
function renderGrid() {
  let list = achievements.filter(a => currentCategory === 'all' || a.category === currentCategory);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(a => a.title.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q));
  }
  // Sort by rate
  list.sort((a,b) => sortAsc ? (a.rate - b.rate) : (b.rate - a.rate));

  // Group by difficulty
  const grouped = { legendary:[], epic:[], rare:[], common:[] };
  list.forEach(a => { grouped[getDifficultyGroup(a.rate)].push(a); });

  let html = '';
  ['legendary','epic','rare','common'].forEach(key => {
    if (grouped[key].length === 0) return;
    html += `<div class="difficulty-label ${key}"><span>${getDifficultyLabel(key)}</span><span class="line"></span></div>`;
    grouped[key].forEach((a,idx) => {
      const unlocked = unlockedSet.has(a.id);
      const delay = (idx * 0.02) + 's';
      const icon = getIcon(a.id);
      const iconSVG = getIconSVG(a.id);
      html += `
        <div class="achievement-card ${unlocked?'unlocked':'locked'}" 
             style="animation-delay:${delay}" 
             onclick="openModal(${a.id})">
          <div class="card-top">
            <div class="icon-box">
              ${iconSVG}
              ${unlocked ? '<span class="sparkles">&#10024;</span>' : ''}
            </div>
            <div class="card-info">
              <div class="card-title">${a.title}</div>
              <div class="card-desc">${a.desc}</div>
            </div>
          </div>
          <div class="card-footer">
            <div class="rate-bar-container">
              <div class="rate-bar-bg">
                <div class="rate-bar-fill" style="width:${a.rate}%"></div>
              </div>
              <div class="rate-text">全球达成率 <span>${a.rate}%</span></div>
            </div>
            <div class="rarity-indicator rarity-${a.rarity}">${getRarityText(a.rarity)}</div>
          </div>
        </div>
      `;
    });
  });

  document.getElementById('grid').innerHTML = html;
  document.getElementById('emptyState').style.display = list.length === 0 ? 'block' : 'none';
}

function getRarityText(r) {
  return { legendary:'传说', epic:'史诗', rare:'稀有', common:'普通' }[r];
}

// ── Modal ──
function openModal(id) {
  const a = achievements.find(x => x.id === id);
  if (!a) return;
  const unlocked = unlockedSet.has(id);
  const iconSVG = getIconSVG(id);
  
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-icon-wrap">
      <div class="modal-icon ${unlocked?'':'locked-icon'}">
        ${iconSVG}
      </div>
    </div>
    <div class="modal-cat-tag">${a.category}</div>
    <div class="modal-title ${unlocked?'':'locked-title'}">${a.title}</div>
    <div class="modal-desc ${unlocked?'':'locked-desc'}">${a.desc}</div>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-num ${unlocked?'':'locked-stat'}">${a.rate}%</div>
        <div class="modal-stat-label">全球达成率</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-num ${unlocked?'':'locked-stat'}">${getRarityText(a.rarity)}</div>
        <div class="modal-stat-label">稀有度</div>
      </div>
    </div>
    ${unlocked ? `
      <div class="modal-story">
        <div class="modal-story-label">📖 成就故事</div>
        <div class="modal-story-text">${a.story}</div>
      </div>
    ` : ''}
    <button class="modal-toggle-btn ${unlocked?'':'locked-btn'}" onclick="toggleUnlock(${id})">
      ${unlocked ? '🔒 标记为未解锁' : '✨ 解锁此成就'}
    </button>
  `;
  
  document.getElementById('modalBackdrop').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('show');
  document.body.style.overflow = '';
}

// ── Unlock ──
function toggleUnlock(id) {
  if (unlockedSet.has(id)) unlockedSet.delete(id);
  else unlockedSet.add(id);
  saveUnlockedState();
  renderGrid();
  initStats();
  // Refresh modal
  openModal(id);
}

function resetProgress() {
  if (!confirm('确定要清除所有本地存档，恢复初始未解锁状态吗？\n\n此操作只会清除当前设备的存档，不影响他人。')) return;
  unlockedSet.clear();
  saveUnlockedState();
  renderGrid();
  initStats();
  showToast('进度已重置！页面已恢复初始状态。');
}

// ── Export / Import ──
function exportProgress() {
  const data = {
    version: '2026.06',
    exportDate: new Date().toISOString(),
    unlocked: [...unlockedSet]
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `EarthOnline-Achievement-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('存档已导出！可发送给朋友导入。');
}

            <div style="font-size: 28px; font-weight: 700; color: #a86fe0;">${epicCount}</div>
            <div style="font-size: 11px; color: #666; margin-top: 4px; letter-spacing: 1px;">史诗达成</div>
          </div>
        </div>

        <!-- Unlocked Achievements Grid -->
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
          ${achievements.filter(a => unlockedSet.has(a.id)).map(a => {
            const icon = getIcon(a.id);
            return `
            <div style="background: ${document.documentElement.getAttribute('data-theme') === 'light' ? 'linear-gradient(145deg, #fffbe6 0%, #fff8e1 100%)' : 'linear-gradient(145deg, #1a170a 0%, #13110a 100%)'}; border: 1px solid ${document.documentElement.getAttribute('data-theme') === 'light' ? 'rgba(139,105,20,0.2)' : 'rgba(191,154,38,0.2)'}; border-radius: 14px; padding: 16px; display: flex; gap: 14px; align-items: flex-start;">
              <div style="width: 48px; height: 48px; border-radius: 10px; background: ${document.documentElement.getAttribute('data-theme') === 'light' ? 'linear-gradient(135deg, rgba(139,105,20,0.15) 0%, rgba(139,105,20,0.04) 100%)' : 'linear-gradient(135deg, rgba(191,154,38,0.15) 0%, rgba(191,154,38,0.04) 100%)'}; border: 1px solid ${document.documentElement.getAttribute('data-theme') === 'light' ? 'rgba(139,105,20,0.25)' : 'rgba(191,154,38,0.25)'}; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 24px;">
                ${icon}
              </div>
              <div style="flex: 1; min-width: 0;">
                <div style="font-size: 14px; font-weight: 600; color: ${document.documentElement.getAttribute('data-theme') === 'light' ? '#8B6914' : '#f5e6a3'}; margin-bottom: 4px;">${a.title}</div>
                <div style="font-size: 12px; color: ${document.documentElement.getAttribute('data-theme') === 'light' ? '#666' : '#999'}; line-height: 1.5; margin-bottom: 8px;">${a.desc}</div>
                <div style="display: flex; align-items: center; gap: 8px;">
                  <div style="flex: 1; height: 4px; background: ${document.documentElement.getAttribute('data-theme') === 'light' ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.04)'}; border-radius: 3px; overflow: hidden;">
                    <div style="width: ${a.rate}%; height: 100%; border-radius: 3px; background: linear-gradient(90deg, ${document.documentElement.getAttribute('data-theme') === 'light' ? '#bf9a26' : '#8B6914'}, ${document.documentElement.getAttribute('data-theme') === 'light' ? '#d4a82a' : '#d4a82a'});"></div>
                  </div>
                  <span style="font-size: 10px; color: ${document.documentElement.getAttribute('data-theme') === 'light' ? '#888' : '#666'};">${a.rate}%</span>
                </div>
              </div>
            </div>
            `;
          }).join('')}
        </div>

        <!-- Footer -->
        <div style="text-align: center; padding: 30px 20px 10px; color: ${document.documentElement.getAttribute('data-theme') === 'light' ? '#aaa' : '#555'}; font-size: 11px; letter-spacing: 1px; margin-top: 40px; border-top: 1px solid ${document.documentElement.getAttribute('data-theme') === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.06)'};">
          地球Online v2026.06 · 每个人都是自己人生的主角 · ${new Date().toLocaleDateString('zh-CN')}
        </div>
      </div>
    `;

    document.body.appendChild(imgContainer);

    // Use html2canvas to capture
    const canvas = await html2canvas(imgContainer, {
      backgroundColor: document.documentElement.getAttribute('data-theme') === 'light' ? '#f5f5f0' : '#08080d',
      scale: 2,
      useCORS: true,
      logging: false
    });

    // Remove temporary container
    document.body.removeChild(imgContainer);

    // Download the image
    const link = document.createElement('a');
    link.download = `EarthOnline-Achievements-${new Date().toISOString().slice(0,10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();

    showToast('成就卡片图片已保存！可以去相册查看。');
  } catch (err) {
    console.error('Export image failed:', err);
    showToast('图片导出失败，请重试。');
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

function importProgress(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.unlocked && Array.isArray(data.unlocked)) {
        unlockedSet = new Set(data.unlocked);
        saveUnlockedState();
        renderGrid();
        initStats();
        showToast(`导入成功！已解锁 ${unlockedSet.size} 个成就。`);
      } else {
        showToast('文件格式不正确，请选择正确的存档文件。');
      }
    } catch(err) {
      showToast('文件解析失败，请确认文件格式正确。');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Search ──
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value;
  renderGrid();
});

// ── Sort ──
function toggleSort() {
  sortAsc = !sortAsc;
  const btn = document.getElementById('sortBtn');
  btn.classList.toggle('desc', !sortAsc);
  btn.querySelector('.arrow').innerHTML = sortAsc ? '&#9650;' : '&#9660;';
  renderGrid();
}

// ── Category filter ──
function filterCat(cat) {
  currentCategory = cat;
  initCategoryTabs();
  renderGrid();
}

// ── Init ──
initTheme();
initStats();
initCategoryTabs();
renderGrid();

// Listen for system theme changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
  const savedTheme = localStorage.getItem('earthOL_theme');
  if (savedTheme === 'system' || !savedTheme) {
    setTheme('system');
  }
});
</script>
