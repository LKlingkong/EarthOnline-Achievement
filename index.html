<style>
/* ── Theme Variables ── */
:root {
  --bg-primary: #08080d; --bg-secondary: #111116;
  --bg-card-locked: #0c0c10; --bg-modal: #14141c;
  --bg-stat: rgba(191,154,38,0.04); --bg-input: rgba(255,255,255,0.03);
  --bg-toolbar-btn: rgba(255,255,255,0.03); --bg-toast: #1a1a24;
  --text-primary: #e8e6e3; --text-secondary: #999; --text-muted: #666;
  --text-dim: #555; --text-dimmer: #444;
  --accent: #bf9a26; --accent-light: #d4a82a;
  --accent-bg: rgba(191,154,38,0.08); --accent-border: rgba(191,154,38,0.2);
  --border-default: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.1);
  --border-input: rgba(255,255,255,0.08);
  --rate-bar-bg: rgba(255,255,255,0.04); --scrollbar-bg: rgba(255,255,255,0.05);
  --scrollbar-thumb: rgba(255,255,255,0.1);
}
[data-theme="light"] {
  --bg-primary: #f5f5f0; --bg-secondary: #ffffff; --bg-card-locked: #e8e8e3;
  --bg-modal: #ffffff; --bg-stat: rgba(191,154,38,0.08);
  --bg-input: rgba(0,0,0,0.03); --bg-toolbar-btn: rgba(0,0,0,0.03); --bg-toast: #ffffff;
  --text-primary: #1a1a1a; --text-secondary: #666; --text-muted: #888;
  --text-dim: #aaa; --text-dimmer: #bbb;
  --accent: #8B6914; --accent-bg: rgba(139,105,20,0.08); --accent-border: rgba(139,105,20,0.2);
  --border-default: rgba(0,0,0,0.08); --border-hover: rgba(0,0,0,0.12); --border-input: rgba(0,0,0,0.08);
  --scrollbar-bg: rgba(0,0,0,0.05); --scrollbar-thumb: rgba(0,0,0,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg-primary); color: var(--text-primary);
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased; transition: background .3s,color .3s; }
.header { text-align:center; padding:48px 20px 20px; position:relative; overflow:hidden; }
.header::before { content:''; position:absolute; top:-40%; left:50%; transform:translateX(-50%);
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(191,154,38,.06)0%,transparent70%); pointer-events:none; }
[data-theme="light"] .header::before { background:radial-gradient(circle,rgba(191,154,38,.1)0%,transparent70%); }
.header h1 { font-size:34px;font-weight:700;color:var(--accent);letter-spacing:6px;
  text-shadow:0 0 60px rgba(191,154,38,.2); position:relative; }
.header .subtitle { margin-top:8px;font-size:13px;color:var(--text-dim);letter-spacing:3px; }

.stats-bar { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; padding:16px 20px 28px; }
.stat-item { background:var(--bg-stat); border:1px solid var(--accent-border); border-radius:12px;
  padding:14px 26px; text-align:center; min-width:130px; transition:.3s; }
.stat-item:hover { transform:translateY(-2px); border-color:rgba(191,154,38,.25); }
.stat-number { font-size:26px;font-weight:700;color:var(--accent); }
.stat-label { font-size:11px;color:var(--text-muted);margin-top:4px;letter-spacing:1px; }

.toolbar { max-width:960px;margin:0 auto 16px;padding:0 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap; }
.search-box { flex:1;min-width:200px;position:relative; }
.search-box input { width:100%;padding:11px 14px 11px 40px;background:var(--bg-input);
  border:1px solid var(--border-input);border-radius:10px;color:var(--text-primary);font-size:13px;
  outline:none;transition:.3s; }
.search-box input:focus { border-color:rgba(191,154,38,.4);background:rgba(191,154,38,.04); }
.search-box input::placeholder{color:var(--text-dimmer)}
.search-box .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-dimmer);font-size:15px;pointer-events:none}
.toolbar-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sort-btn,.action-btn{padding:9px 16px;background:var(--bg-toolbar-btn);border:1px solid var(--border-input);
  border-radius:10px;color:var(--text-muted);font-size:12px;cursor:pointer;transition:.25s;
  white-space:nowrap;display:flex;align-items:center;gap:6px}
.sort-btn:hover,.action-btn:hover{border-color:var(--border-hover);color:var(--text-secondary)}
.sort-btn.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.sort-btn .arrow{transition:transform .3s}.sort-btn.desc .arrow{transform:rotate(180deg)}
.action-btn.danger{color:#e55;border-color:rgba(229,85,85,.2)}.action-btn.danger:hover{background:rgba(229,85,85,.08);color:#f77}
.action-btn.export-btn:hover{border-color:var(--accent-border);color:var(--accent)}

.theme-toggle{width:38px;height:38px;border-radius:10px;background:var(--bg-toolbar-btn);border:1px solid var(--border-input);
  color:var(--text-muted);font-size:18px;cursor:pointer;transition:.25s;display:flex;align-items:center;justify-content:center}
.theme-toggle:hover{border-color:var(--border-hover);color:var(--accent);background:var(--accent-bg)}

.difficulty-label{display:flex;align-items:center;gap:10px;padding:10px 0;font-size:13px;font-weight:500;letter-spacing:1px}
.difficulty-label .line{flex:1;height:1px}
.difficulty-label.legendary{color:var(--accent)}.difficulty-label.legendary .line{background:linear-gradient(90deg,rgba(191,154,38,.3),transparent)}
.difficulty-label.epic{color:#c084fc}.difficulty-label.epic .line{background:linear-gradient(90deg,rgba(168,85,247,.3),transparent)}
.difficulty-label.rare{color:#60a5fa}.difficulty-label.rare .line{background:linear-gradient(90deg,rgba(59,130,246,.3),transparent)}
.difficulty-label.common{color:var(--text-muted)}.difficulty-label.common .line{background:linear-gradient(90deg,rgba(150,150,150,.2),transparent)}

.category-tabs{max-width:960px;margin:0 auto 20px;padding:0 20px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.cat-tab{padding:6px 14px;background:transparent;border:1px solid var(--border-default);border-radius:20px;color:var(--text-muted);font-size:11px;cursor:pointer;transition:.25s}
.cat-tab:hover{color:var(--text-secondary);border-color:var(--border-hover)}.cat-tab.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}

.container{max-width:960px;margin:0 auto;padding:0 20px 60px}
.achievement-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:14px}

.achievement-card{background:var(--bg-secondary);border:1px solid var(--border-default);border-radius:14px;padding:16px 18px;cursor:pointer;transition:all .35s ease;position:relative;overflow:hidden;animation:cardIn .5s ease forwards;opacity:0;transform:translateY(10px)}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.achievement-card.locked{background:var(--bg-card-locked);border-color:rgba(255,255,255,.04)}
.achievement-card.locked .icon-box{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06)}
.achievement-card.locked .icon-svg{stroke:#333;opacity:.4}
.achievement-card.locked .card-title{color:var(--text-dimmer)}.achievement-card.locked .card-desc{color:#333}
.achievement-card.locked .rate-text{color:var(--text-dimmer)}
.achievement-card.locked .rate-bar-bg{background:var(--rate-bar-bg)}
.achievement-card.locked .rate-bar-fill{background:linear-gradient(90deg,#222,#333)}
.achievement-card.locked .card-footer{border-top-color:rgba(255,255,255,.03)}
.achievement-card.locked .rarity-indicator{opacity:.35}
.achievement-card.locked:hover{border-color:var(--border-hover);background:#121218;transform:translateY(-2px)}
.achievement-card.locked:hover .icon-svg{stroke:#555;opacity:.7}
.achievement-card.locked:hover .card-title{color:#666}
.achievement-card.unlocked{background:linear-gradient(145deg,#1a170a 0%,#13110a 100%);border-color:var(--accent-border);box-shadow:0 0 0 rgba(191,154,38,0),inset 0 0 30px rgba(191,154,38,.02)}
.achievement-card.unlocked::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(191,154,38,.5),transparent)}
[data-theme="light"] .achievement-card.unlocked::before{background:linear-gradient(90deg,transparent,rgba(139,105,20,.5),transparent)}
.achievement-card.unlocked .icon-box{background:linear-gradient(135deg,rgba(191,154,38,.15),rgba(191,154,38,.04));border-color:rgba(191,154,38,.25)}
.achievement-card.unlocked .icon-svg{stroke:#d4a82a;filter:drop-shadow(0 0 4px rgba(191,154,38,.3))}
.achievement-card.unlocked .card-title{color:#f5e6a3}[data-theme="light"] .achievement-card.unlocked .card-title{color:#8B6914}
.achievement-card.unlocked .card-desc{color:var(--text-secondary)}
.achievement-card.unlocked .rate-bar-fill{background:linear-gradient(90deg,#8B6914,#d4a82a)}
.achievement-card.unlocked:hover{border-color:rgba(191,154,38,.4);box-shadow:0 4px 24px rgba(0,0,0,.3),0 0 30px rgba(191,154,38,.06);transform:translateY(-3px)}

.card-top{display:flex;align-items:flex-start;gap:14px}
.icon-box{width:54px;height:54px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;transition:.35s}
.icon-box .icon-svg{width:30px;height:30px;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:.35s}
.icon-box .sparkles{position:absolute;top:-4px;right:-4px;font-size:10px;color:var(--accent-light);filter:drop-shadow(0 0 4px rgba(191,154,38,.6));animation:twinkle 2s ease infinite}
@keyframes twinkle{0%,100%{opacity:1}50%{opacity:.4}}
.card-info{flex:1;min-width:0}
.card-title{font-size:15px;font-weight:600;margin-bottom:5px;transition:color .35s}
.card-desc{font-size:12.5px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text-secondary);transition:color .35s}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:11px;border-top:1px solid var(--border-default);transition:border-color .35s}
.rate-bar-container{flex:1;margin-right:14px}
.rate-bar-bg{height:4px;background:var(--rate-bar-bg);border-radius:3px;overflow:hidden}
.rate-bar-fill{height:100%;border-radius:3px;transition:width .8s ease;width:0%}
.rate-text{font-size:10.5px;margin-top:4px;transition:color .35s;color:var(--text-dim)}

.rarity-indicator{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:10.5px;font-weight:500;flex-shrink:0;transition:.35s}
.rarity-common{background:rgba(120,120,120,.08);color:#666;border:1px solid rgba(120,120,120,.12)}
.rarity-rare{background:rgba(59,130,246,.08);color:#5090e0;border:1px solid rgba(59,130,246,.15)}
.rarity-epic{background:rgba(168,85,247,.08);color:#a86fe0;border:1px solid rgba(168,85,247,.15)}
.rarity-legendary{background:rgba(191,154,38,.08);color:var(--accent);border:1px solid var(--accent-border)}

.empty-state{text-align:center;padding:80px 20px;color:var(--text-dimmer)}
.empty-state .empty-icon{font-size:42px;margin-bottom:14px;opacity:.25}
.footer-note{text-align:center;padding:24px 20px 40px;color:var(--text-dimmer);font-size:11px;letter-spacing:1px}

.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);justify-content:center;align-items:center;padding:20px}
[data-theme="light"] .modal-backdrop{background:rgba(0,0,0,.5)}
.modal-backdrop.show{display:flex}
.modal{background:var(--bg-modal);border:1px solid var(--accent-border);border-radius:18px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;padding:30px 26px;position:relative;animation:modalIn .3s ease}
@keyframes modalIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:1px solid var(--border-input);color:var(--text-dim);width:30px;height:30px;border-radius:8px;font-size:16px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:var(--text-secondary);border-color:var(--border-hover)}

.modal-icon-wrap{text-align:center;margin-bottom:18px}
.modal-icon{width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,rgba(191,154,38,.12),rgba(191,154,38,.02));border:1px solid rgba(191,154,38,.18);display:inline-flex;align-items:center;justify-content:center}
[data-theme="light"] .modal-icon{background:linear-gradient(135deg,rgba(139,105,20,.12),rgba(139,105,20,.02));border:1px solid rgba(139,105,20,.18)}
.modal-icon .icon-svg{width:40px;height:40px;fill:none;stroke:var(--accent);stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.modal-icon.locked-icon{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.06)}[data-theme="light"] .modal-icon.locked-icon{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.06)}
.modal-icon.locked-icon .icon-svg{stroke:#333;opacity:.5}
.modal-cat-tag{display:inline-block;padding:3px 12px;border-radius:10px;font-size:11px;background:rgba(191,154,38,.06);color:var(--text-muted);border:1px solid var(--border-default);margin-bottom:14px}[data-theme="light"] .modal-cat-tag{background:rgba(139,105,20,.06)}
.modal-title{text-align:center;font-size:20px;font-weight:600;color:#e8d8a0;margin-bottom:8px}[data-theme="light"] .modal-title{color:#8B6914}
.modal-title.locked-title{color:var(--text-dim)}.modal-desc{text-align:center;font-size:13px;color:var(--text-muted);margin-bottom:18px;line-height:1.6}.modal-desc.locked-desc{color:var(--text-dimmer)}
.modal-stats{display:flex;justify-content:center;gap:28px;margin-bottom:20px}.modal-stat{text-align:center}
.modal-stat-num{font-size:22px;font-weight:700;color:var(--accent)}.modal-stat-num.locked-stat{color:var(--text-dimmer)}.modal-stat-label{font-size:10.5px;color:var(--text-dim);margin-top:2px}
.modal-story{background:rgba(255,255,255,.02);border-radius:10px;padding:14px;border:1px solid rgba(255,255,255,.04);margin-bottom:18px}[data-theme="light"] .modal-story{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.04)}
.modal-story-label{color:var(--text-dim);font-size:11px;margin-bottom:7px}.modal-story-text{color:var(--text-secondary);font-size:13px;line-height:1.75}
.modal-toggle-btn{display:block;margin:0 auto;padding:9px 28px;border-radius:8px;font-size:13px;cursor:pointer;transition:.25s;border:1px solid var(--accent-border);background:var(--accent-bg);color:var(--accent)}
.modal-toggle-btn:hover{background:rgba(191,154,38,.12);border-color:rgba(191,154,38,.35)}[data-theme="light"] .modal-toggle-btn:hover{background:rgba(139,105,20,.12);border-color:rgba(139,105,20,.35)}
.modal-toggle-btn.locked-btn{border-color:var(--border-input);background:var(--bg-toolbar-btn);color:var(--text-muted)}.modal-toggle-btn.locked-btn:hover{border-color:var(--accent-border);color:var(--accent)}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-toast);border:1px solid var(--accent-border);color:var(--text-primary);padding:12px 24px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:.4s ease;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.3)}[data-theme="light"] .toast{box-shadow:0 4px 20px rgba(0,0,0,.1)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:520px){.achievement-grid{grid-template-columns:1fr}.header h1{font-size:24px;letter-spacing:3px}.stat-item{padding:10px 16px;min-width:100px}.stat-number{font-size:20px}.toolbar{flex-direction:column;align-items:stretch}.toolbar-btns{justify-content:center}.modal{padding:22px 18px}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--scrollbar-bg)}::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px}
</style>
</head>

<div class="header"><h1>地球 Online</h1><div class="subtitle">Achievement System · 人生成就系统 · 117个成就</div></div>

// State
let unlockedSet = new Set(JSON.parse(localStorage.getItem('earthOL_unlocked')||'[]'));
let currentCategory='all', searchQuery='', sortAsc=true;

const categories=[...new Set(ACHIEVEMENTS.map(a=>a.c))];

// Theme
function initTheme(){ const t=localStorage.getItem('earthOL_theme'); setTheme(t||'system'); }
function setTheme(theme){
  let actual=theme==='system'?(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):theme;
  document.documentElement.setAttribute('data-theme',actual);
  localStorage.setItem('earthOL_theme',theme);
  const icon=document.getElementById('themeIcon'), btn=document.getElementById('themeToggle');
  if(theme==='system'){icon.innerHTML='&#127769;';btn.title='跟随系统'}
  else if(actual==='dark'){icon.innerHTML='&#127769;';btn.title='深色模式'}
  else{icon.innerHTML='&#9728;';btn.title='浅色模式'}
  document.getElementById('themeColorMeta').content=actual==='dark'?'#08080d':'#f5f5f0';
}
function toggleTheme(){
  const c=localStorage.getItem('earthOL_theme')||'system';
  setTheme(c==='system'?'dark':c==='dark'?'light':'system');
}
function saveUnlockedState(){ localStorage.setItem('earthOL_unlocked',JSON.stringify([...unlockedSet])); }

// Stats
function initStats(){
  const total=ACHIEVEMENTS.length, unlocked=unlockedSet.size,
    pct=total?Math.round(unlocked/total*100):0,
    leg=ACHIEVEMENTS.filter(a=>a.R==='legendary').filter(a=>unlockedSet.has(a.id)).length,
    epi=ACHIEVEMENTS.filter(a=>a.R==='epic').filter(a=>unlockedSet.has(a.id)).length;
  document.getElementById('statsBar').innerHTML=
    `<div class="stat-item"><div class="stat-number">${unlocked}/${total}</div><div class="stat-label">已解锁</div></div>
     <div class="stat-item"><div class="stat-number">${pct}%</div><div class="stat-label">完成度</div></div>
     <div class="stat-item"><div class="stat-number">${leg}</div><div class="stat-label">传说达成</div></div>
     <div class="stat-item"><div class="stat-number">${epi}</div><div class="stat-label">史诗达成</div></div>`;
}

// Category tabs
function initCategoryTabs(){
  let h=`<button class="cat-tab ${currentCategory==='all'?'active':''}" onclick="filterCat('all')">全部</button>`;
  categories.forEach(c=> h+=`<button class="cat-tab ${currentCategory===c?'active':''}" onclick="filterCat('${c}')">${c}</button>`);
  document.getElementById('categoryTabs').innerHTML=h;
}

function getDG(r){ return r<5?'legendary':r<10?'epic':r<50?'rare':'common'; }
function getDL(k){ return{legendary:'传说·Legendary',epic:'史诗·Epic',rare:'稀有·Rare',common:'普通·Common'}[k]; }
function getRT(r){ return{legendary:'传说',epic:'史诗',rare:'稀有',common:'普通'}[r]; }

// Render Grid
function renderGrid(){
  let list=ACHIEVEMENTS.filter(a=>currentCategory==='all'||a.c===currentCategory);
  if(searchQuery){ const q=searchQuery.toLowerCase(); list=list.filter(a=>a.t.toLowerCase().includes(q)||a.d.toLowerCase().includes(q)); }
  list.sort((a,b)=>sortAsc?(a.r-b.r):(b.r-a.r));
  const g={legendary:[],epic:[],rare:[],common:[]}; list.forEach(a=>g[getDG(a.r)].push(a));
  let html='';
  ['legendary','epic','rare','common'].forEach(k=>{
    if(!g[k].length)return;
    html+=`<div class="difficulty-label ${k}"><span>${getDL(k)}</span><span class="line"></span></div>`;
    g[k].forEach((a,i)=>{
      const u=unlockedSet.has(a.id), delay=(i*.05)+'s';
      html+=`<div class="achievement-card ${u?'unlocked':'locked'}" style="animation-delay:${delay}" onclick="openModal(${a.id})">
        <div class="card-top"><div class="icon-box">${svgIco(a.id)}${u?'<span class="sparkles">&#10024;</span>':''}</div>
        <div class="card-info"><div class="card-title">${a.t}</div><div class="card-desc">${a.d}</div></div></div>
        <div class="card-footer"><div class="rate-bar-container"><div class="rate-bar-bg"><div class="rate-bar-fill" style="width:${a.r}%"></div></div>
        <div class="rate-text">全球达成率 <span>${a.r}%</span></div></div>
        <div class="rarity-indicator rarity-${a.R||'common'}">${getRT(a.R)}</div></div></div>`;
    });
  });
  document.getElementById('grid').innerHTML=html;
  document.getElementById('emptyState').style.display=list.length?'none':'block';
}

// Icons
function svgIco(id){
  const m={
    1:`<svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2L15 8.5L22 9.5L17 14.5L18 21.5L12 18.5L6 21.5L7 14.5L2 9.5L9 8.5Z"/></svg>`,
    62:`<svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`,
    default:`<svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`
  };
  return m[id]||m.default;
}

// Modal
function openModal(id){
  const a=ACHIEVEMENTS.find(x=>x.id===id); if(!a)return;
  const u=unlockedSet.has(id);
  document.getElementById('modalContent').innerHTML=`
    <div class="modal-icon-wrap"><div class="modal-icon ${u?'':'locked-icon'}">${svgIco(id)}</div></div>
    <div class="modal-cat-tag">${a.c}</div>
    <div class="modal-title ${u?'':'locked-title'}">${a.t}</div>
    <div class="modal-desc ${u?'':'locked-desc'}">${a.d}</div>
    <div class="modal-stats"><div class="modal-stat"><div class="modal-stat-num ${u?'':'locked-stat'}">${a.r}%</div><div class="modal-stat-label">全球达成率</div></div>
    <div class="modal-stat"><div class="modal-stat-num ${u?'':'locked-stat'}">${getRT(a.R)}</div><div class="modal-stat-label">稀有度</div></div></div>
    ${u?`<div class="modal-story"><div class="modal-story-label">📖 成就故事</div><div class="modal-story-text">${a.s}</div></div>`:''}
    <button class="modal-toggle-btn ${u?'':'locked-btn'}" onclick="toggleUnlock(${id})">${u?'🔒 标记为未解锁':'✨ 解锁此成就'}</button>`;
  document.getElementById('modalBackdrop').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){ document.getElementById('modalBackdrop').classList.remove('show'); document.body.style.overflow=''; }

function toggleUnlock(id){ if(unlockedSet.has(id))unlockedSet.delete(id);else unlockedSet.add(id); saveUnlockedState(); renderGrid(); initStats(); openModal(id); }
function resetProgress(){ if(!confirm('确定清除所有本地存档恢复初始状态？'))return; unlockedSet.clear(); saveUnlockedState(); renderGrid(); initStats(); showToast('进度已重置！'); }

function exportProgress(){
  const data={version:'2026.06.2',exportDate:new Date().toISOString(),unlocked:[...unlockedSet]};
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b), a=document.createElement('a'); a.href=u;
  a.download=`EarthOnline-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(u);
  showToast('存档已导出！');
}
function importProgress(input){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=function(e){
    try{ const d=JSON.parse(e.target.result);
      if(d.unlocked&&Array.isArray(d.unlocked)){unlockedSet=new Set(d.unlocked);saveUnlockedState();renderGrid();initStats();showToast(`导入成功！${unlockedSet.size}个`);}
      else showToast('格式不正确');
    }catch(e){showToast('解析失败');}
  }; r.readAsText(f); input.value='';
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

document.getElementById('searchInput').addEventListener('input',function(){ searchQuery=this.value; renderGrid(); });
function toggleSort(){ sortAsc=!sortAsc; const b=document.getElementById('sortBtn'); b.classList.toggle('desc',!sortAsc); b.querySelector('.arrow').innerHTML=sortAsc?'&#9650;':'&#9660;'; renderGrid(); }
function filterCat(cat){ currentCategory=cat; initCategoryTabs(); renderGrid(); }

// Init
initTheme(); initStats(); initCategoryTabs(); renderGrid();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{
  const t=localStorage.getItem('earthOL_theme'); if(t==='system'||!t)setTheme('system');
});
</script>
